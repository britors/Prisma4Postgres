app-id: br.com.w3ti.Prisma4Postgres
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: run.sh
separate-locales: false

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_CACHE: /run/build/prisma4postgres/flatpak-node/npm-cache
    NPM_CONFIG_OFFLINE: 'true'
    npm_config_nodedir: /usr/lib/sdk/node20
    # Skip Electron binary download — we use the one provided by Electron2.BaseApp
    ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

finish-args:
  # Window system
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # Network — required for PostgreSQL connections
  - --share=network
  # GPU (for Electron/Chromium hardware acceleration)
  - --device=dri
  # User home filesystem — for opening/saving files via dialogs
  - --filesystem=home
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # Electron sandbox helper
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: prisma4postgres
    buildsystem: simple
    build-options:
      env:
        HOME: /root

    build-commands:
      # Restore npm dependencies from offline cache (generated-sources.json)
      - npm ci --offline

      # Compile TypeScript via esbuild
      - node esbuild.js --production

      # Extract Electron binary (arch-specific, from pre-downloaded cache)
      - |
        ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/;s/armv7l/armv7l/')
        install -dm755 /app/electron
        unzip -q "flatpak-node/cache/electron/electron-v29.4.6-linux-${ARCH}.zip" -d /app/electron
        chmod +x /app/electron/electron /app/electron/chrome-sandbox

      # Install app bundle to /app/prisma4postgres (preserve out/ prefix to match package.json "main")
      - install -dm755 /app/prisma4postgres/out
      - cp -a out/main     /app/prisma4postgres/out/main
      - cp -a out/preload  /app/prisma4postgres/out/preload
      - cp -a out/renderer /app/prisma4postgres/out/renderer
      - install -Dm644 package.json /app/prisma4postgres/package.json

      # Copy the pg pure-JS driver (no native bindings needed)
      - install -dm755 /app/prisma4postgres/node_modules
      - cp -a node_modules/pg                   /app/prisma4postgres/node_modules/pg
      - cp -a node_modules/pg-pool              /app/prisma4postgres/node_modules/pg-pool
      - cp -a node_modules/pg-protocol          /app/prisma4postgres/node_modules/pg-protocol
      - cp -a node_modules/pg-types             /app/prisma4postgres/node_modules/pg-types
      - cp -a node_modules/pgpass               /app/prisma4postgres/node_modules/pgpass
      - cp -a node_modules/pg-connection-string /app/prisma4postgres/node_modules/pg-connection-string

      # Launcher script
      - install -Dm755 run.sh /app/bin/run.sh

      # Desktop entry
      - install -Dm644 br.com.w3ti.Prisma4Postgres.desktop
          /app/share/applications/br.com.w3ti.Prisma4Postgres.desktop

      # Icon
      - install -Dm644 logo.svg
          /app/share/icons/hicolor/scalable/apps/br.com.w3ti.Prisma4Postgres.svg

      # AppStream metadata
      - install -Dm644 br.com.w3ti.Prisma4Postgres.metainfo.xml
          /app/share/metainfo/br.com.w3ti.Prisma4Postgres.metainfo.xml

    sources:
      - type: git
        url: https://github.com/britors/Prisma4Postgres.git
        tag: v1.0.0
        commit: 5124bcb3359c3a7cf868f68916db6c8553728549

      # Generated offline npm cache — run once before building:
      #   pip install flatpak-node-generator
      #   flatpak-node-generator npm package-lock.json -o flatpak/generated-sources.json
      - generated-sources.json

      - type: script
        dest-filename: run.sh
        commands:
          # Unset ELECTRON_RUN_AS_NODE so the app runs as Electron, not plain Node.js
          # (VS Code and other host Electron apps set this; it can bleed into child processes)
          - unset ELECTRON_RUN_AS_NODE
          - zypak-wrapper /app/electron/electron /app/prisma4postgres "$@"

      - type: file
        path: br.com.w3ti.Prisma4Postgres.desktop

      - type: file
        path: br.com.w3ti.Prisma4Postgres.metainfo.xml

      - type: file
        path: br.com.w3ti.Prisma4Postgres.svg
        dest-filename: logo.svg
