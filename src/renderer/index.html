        d.indexes.forEach(function (ix) {
          var flags = '';
          if (ix.isPrimary) flags += '<span class="tdetail-badge pk">PK</span>';
          else if (ix.isUnique) flags += '<span class="tdetail-badge uq">UNIQUE</span>';
          else flags += '<span class="tdetail-badge idx">IDX</span>';
          html += '<tr>'
            + '<td style="font-family:var(--vscode-editor-font-family,monospace);font-size:11px">' + esc(ix.name) + '</td>'
            + '<td style="color:var(--vscode-descriptionForeground)">' + esc(ix.size) + '</td>'
            + '<td>' + flags + '</td>'
            + '<td style="font-family:var(--vscode-editor-font-family,monospace);font-size:11px;color:var(--vscode-textPreformat-foreground);max-width:400px;overflow:hidden;text-overflow:ellipsis">' + esc(ix.definition) + '</td>'
            + '</tr>';
        });
        html += '</tbody></table></div></div>';
      }

      // ── FK Map ──
      if (d.fkMap.length) {
        html += '<div class="tdetail-section">'
          + '<div class="tdetail-section-hdr"><i class="codicon codicon-references"></i>Foreign Keys <span style="margin-left:4px;font-weight:400;opacity:0.6">(' + d.fkMap.length + ')</span></div>'
          + '<div class="tdetail-section-body"><table class="tdetail-table"><thead><tr>'
          + '<th>Direction</th><th>Column</th><th>References</th><th>Constraint</th>'
          + '</tr></thead><tbody>';
        d.fkMap.forEach(function (fk) {
          var ref = fk.foreignSchema + '.' + fk.foreignTable + '.' + fk.foreignColumn;
          html += '<tr>'
            + '<td><span class="tdetail-badge ' + (fk.direction === 'outgoing' ? 'fk' : 'uq') + '">' + (fk.direction === 'outgoing' ? '→ out' : '← in') + '</span></td>'
            + '<td style="font-family:var(--vscode-editor-font-family,monospace);font-size:11px">' + esc(fk.column) + '</td>'
            + '<td><span class="tdetail-fk-link" data-action="navigate-fk" data-schema="' + esc(fk.foreignSchema) + '" data-table="' + esc(fk.foreignTable) + '" data-conn-id="' + esc(tab.connId) + '">' + esc(ref) + '</span></td>'
            + '<td style="font-family:var(--vscode-editor-font-family,monospace);font-size:11px;color:var(--vscode-descriptionForeground)">' + esc(fk.constraintName) + '</td>'
            + '</tr>';
        });
        html += '</tbody></table></div></div>';
      }

      if (content) {
        content.innerHTML = html;
        // FK navigation links
        content.querySelectorAll('[data-action="navigate-fk"]').forEach(function (el) {
          el.addEventListener('click', function () {
            var connId2 = el.dataset.connId;
            var fkSchema = el.dataset.schema;
            var fkTable = el.dataset.table;
            openTableTab(connId2, fkSchema, fkTable);
          });
        });
      }
    }

    // ── Sidebar resize ─────────────────────────────────────────────────────
    (function () {
      var sidebar = document.getElementById('sidebar');
      var handle  = document.getElementById('resize-handle');
      var MIN_W = 160, MAX_W = 600;
      var startX, startW;

      var savedW = persisted.sidebarWidth || 240;
      sidebar.style.setProperty('--sidebar-width', savedW + 'px');
      sidebar.style.width = savedW + 'px';

      handle.addEventListener('mousedown', function (e) {
        startX = e.clientX;
        startW = sidebar.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });

      function onMove(e) {
        var w = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
        sidebar.style.width = w + 'px';
      }

      function onUp(e) {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        var w = Math.min(MAX_W, Math.max(MIN_W, startW + (e.clientX - startX)));
        persisted.sidebarWidth = w;
        saveState();
      }
    }());

    // ── Query split resize ─────────────────────────────────────────────────
    (function () {
      var splitEl   = document.getElementById('query-split');
      var editorPane = document.getElementById('query-editor-pane');
      var handle    = document.getElementById('query-h-resize');
      var MIN_H = 80;
      var startY, startEditorH, startSplitH;

      function applyRatio(ratio) {
        var splitH = splitEl.getBoundingClientRect().height;
        if (!splitH) return;
        var handleH = handle.getBoundingClientRect().height || 4;
        var available = splitH - handleH;
        var editorH = Math.max(MIN_H, Math.min(available - MIN_H, Math.round(available * ratio)));
        editorPane.style.height = editorH + 'px';
        editorPane.style.flex = 'none';
        if (monacoEditor) monacoEditor.layout();
      }

      // restore saved ratio or default 0.5
      var savedRatio = persisted.querySplitRatio != null ? persisted.querySplitRatio : 0.5;
      // defer until the panel is visible (it starts hidden)
      var splitInitDone = false;
      function initSplit() {
        if (splitInitDone) return;
        if (!splitEl.getBoundingClientRect().height) return;
        splitInitDone = true;
        applyRatio(savedRatio);
      }

      handle.addEventListener('mousedown', function (e) {
        initSplit();
        startY = e.clientY;
        startEditorH = editorPane.getBoundingClientRect().height;
        startSplitH  = splitEl.getBoundingClientRect().height;
        handle.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });

      function onMove(e) {
        var handleH = handle.getBoundingClientRect().height || 4;
        var available = startSplitH - handleH;
        var newH = Math.max(MIN_H, Math.min(available - MIN_H, startEditorH + (e.clientY - startY)));
        editorPane.style.height = newH + 'px';
        editorPane.style.flex = 'none';
        if (monacoEditor) monacoEditor.layout();
      }

      function onUp(e) {
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        var handleH = handle.getBoundingClientRect().height || 4;
        var available = startSplitH - handleH;
        var newH = Math.max(MIN_H, Math.min(available - MIN_H, startEditorH + (e.clientY - startY)));
        persisted.querySplitRatio = newH / available;
        saveState();
      }

      // call initSplit whenever the query tab becomes visible
      window.__initQuerySplit = function () { splitInitDone = false; setTimeout(initSplit, 30); };
    }());

    // ── Connection form ────────────────────────────────────────────────────
    function showForm(conn) {
      editingId = conn ? conn.id : null;
      document.getElementById('form-title').textContent = conn ? 'Edit Connection' : 'Add Connection';
      document.getElementById('f-label').value    = conn ? conn.label    : '';
      document.getElementById('f-host').value     = conn ? conn.host     : 'localhost';
      document.getElementById('f-port').value     = conn ? String(conn.port) : String(settings.defaultPort);
      document.getElementById('f-database').value = conn ? conn.database : '';
      document.getElementById('f-user').value     = conn ? conn.user     : '';
      document.getElementById('f-password').value = '';
      document.getElementById('f-ssl').checked    = conn ? conn.ssl      : settings.defaultSsl;
      var ts = document.getElementById('test-status'); ts.textContent = ''; ts.className = 'test-status';
      document.getElementById('view-tree').classList.add('hidden');
      document.getElementById('view-form').classList.remove('hidden');
    }

    function showTree() { editingId = null; document.getElementById('view-form').classList.add('hidden'); document.getElementById('view-tree').classList.remove('hidden'); }

    function getFormData() {
      return {
        conn: {
          id: editingId,
          label: document.getElementById('f-label').value.trim(),
          host: document.getElementById('f-host').value.trim(),
          port: parseInt(document.getElementById('f-port').value, 10) || 5432,
          database: document.getElementById('f-database').value.trim(),
          user: document.getElementById('f-user').value.trim(),
          ssl: document.getElementById('f-ssl').checked
        },
        password: document.getElementById('f-password').value
      };
    }

    document.getElementById('btn-add-conn').addEventListener('click', function () { showForm(null); });
    document.getElementById('btn-back').addEventListener('click', showTree);
    document.getElementById('btn-test').addEventListener('click', function () {
      var ts = document.getElementById('test-status'); ts.textContent = 'Testing…'; ts.className = 'test-status testing';
      api.send('testConnection', getFormData());
    });
    document.getElementById('conn-form').addEventListener('submit', function (e) {
      e.preventDefault(); api.send('saveConnection', getFormData());
    });

    // ── Query tabs ─────────────────────────────────────────────────────────
    function activeQTab() { return tabs.find(function (t) { return t.id === activeQTabId; }) || tabs[0]; }

    function renderQueryTabs() {
      var html = '';
      tabs.forEach(function (t) {
        var isAct = t.id === activeQTabId;
        html += '<div class="query-tab ' + (isAct ? 'active' : '') + '" data-qtab="' + esc(t.id) + '">'
          + ICONS.fileSql
          + '<span class="query-tab-name">' + esc(t.name) + '</span>'
          + '<button class="query-tab-close' + (tabs.length > 1 ? '' : ' invisible') + '" data-close-tab="' + esc(t.id) + '" title="Close"><i class="codicon codicon-close"></i></button>'
          + '</div>';
      });
      document.getElementById('query-tab-list').innerHTML = html;
    }

    document.getElementById('query-tab-list').addEventListener('click', function (e) {
      var closeBtn = e.target.closest('[data-close-tab]');
      if (closeBtn) { e.stopPropagation(); closeQTab(closeBtn.dataset.closeTab); return; }
      var tabEl = e.target.closest('[data-qtab]');
      if (tabEl) switchQTab(tabEl.dataset.qtab);
    });

    function newQTab() {
      var n = tabs.length + 1;
      var t = { id: 'qtab-' + Date.now(), name: 'Query ' + n, sql: '', connId: activeQTab().connId, result: null };
      tabs.push(t);
      if (persisted.tab !== 'query') switchMainTab('query');
      switchQTab(t.id);
    }
    document.getElementById('btn-new-tab').addEventListener('click', newQTab);

    function switchQTab(id) {
      if (monacoEditor && activeQTabId) activeQTab().sql = monacoEditor.getValue();
      activeQTabId = id;
      var tab = activeQTab();
      if (monacoEditor) monacoEditor.setValue(tab.sql || '');
      saveState(); renderQueryTabs(); renderConnSelect(); renderResults(tab.result);
      var statusEl = document.getElementById('query-status');
      if (tab.result) {
        statusEl.classList.remove('hidden');
        var isErr = !!tab.result.error;
        statusEl.className = 'query-status' + (isErr ? ' error' : '');
        statusEl.textContent = isErr ? (tab.result.error || 'Error') : (tab.result.rowCount + ' rows · ' + tab.result.durationMs + 'ms');
      } else { statusEl.classList.add('hidden'); }
    }

    function closeQTab(id) {
      var idx = tabs.findIndex(function (t) { return t.id === id; });
      if (idx < 0) return;
      tabs.splice(idx, 1);
      if (activeQTabId === id) switchQTab(tabs[Math.max(0, idx - 1)].id);
      else { saveState(); renderQueryTabs(); }
    }

    // ── Connection select ──────────────────────────────────────────────────
    function renderConnSelect() {
      var sel = document.getElementById('conn-select');
      var tab = activeQTab();
      sel.innerHTML = '<option value="">Select connection…</option>'
        + connections.map(function (c) {
            var s = statuses[c.id] || 'disconnected';
            return '<option value="' + esc(c.id) + '" ' + (tab.connId === c.id ? 'selected' : '') + '>'
              + esc(c.label) + (s === 'connected' ? ' ●' : ' ○') + '</option>';
          }).join('');
    }

    document.getElementById('conn-select').addEventListener('change', function () {
      var connId = this.value;
      activeQTab().connId = connId; saveState();
      if (connId) api.send('loadCompletions', { connId: connId });
    });

    // ── Monaco ─────────────────────────────────────────────────────────────
    function ensureMonacoReady() {
      if (monacoReady) { if (monacoEditor) monacoEditor.layout(); return; }
      window.MonacoEnvironment = {
        getWorkerUrl: function () {
          var code = 'self.MonacoEnvironment={baseUrl:"' + MONACO_CDN + '/"};importScripts("' + MONACO_CDN + '/base/worker/workerMain.js");';
          return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
        }
      };
      require.config({ paths: { vs: MONACO_CDN } });
      require(['vs/editor/editor.main'], function () {
        monacoReady = true;
        var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var tab = activeQTab();
        monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
          value: tab.sql || '',
          language: 'sql',
          theme: isDark ? 'vs-dark' : 'vs',
          minimap: { enabled: false },
          lineNumbers: 'on',
          fontSize: 13,
          wordWrap: 'on',
          automaticLayout: true,
          scrollBeyondLastLine: false,
          tabSize: 2,
          renderLineHighlight: 'all',
        });
        monacoEditor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runQuery);
        monacoEditor.addCommand(monaco.KeyMod.Shift | monaco.KeyMod.Alt | monaco.KeyCode.KeyF, formatSQL);
        monacoEditor.onDidChangeModelContent(function () { activeQTab().sql = monacoEditor.getValue(); });
        if (tab.connId) api.send('loadCompletions', { connId: tab.connId });
      });
    }

    // ── Execute query ──────────────────────────────────────────────────────
    document.getElementById('btn-run').addEventListener('click', runQuery);
    document.getElementById('btn-explain').addEventListener('click', runExplain);

    var runningConnId = null;

    function runQuery() {
      var tab = activeQTab();
      if (!tab.connId) { setStatus('No connection selected.', true); return; }
      var sql = monacoEditor
        ? (monacoEditor.getModel().getValueInRange(monacoEditor.getSelection()).trim() || monacoEditor.getValue().trim())
        : tab.sql.trim();
      if (!sql) return;
      runningConnId = tab.connId;
      document.getElementById('btn-run').disabled = true;
      document.getElementById('btn-cancel').classList.remove('hidden');
      setStatus('Executing…', false);
      api.send('executeQuery', { connId: tab.connId, sql: sql, tabId: tab.id });
    }

    function stopRunning() {
      document.getElementById('btn-run').disabled = false;
      document.getElementById('btn-cancel').classList.add('hidden');
      runningConnId = null;
    }

    document.getElementById('btn-cancel').addEventListener('click', function () {
      if (runningConnId) api.send('cancelQuery', { connId: runningConnId });
    });

    function runExplain() {
      var tab = activeQTab();
      if (!tab.connId) { setStatus('No connection selected.', true); return; }
      var sql = monacoEditor
        ? (monacoEditor.getModel().getValueInRange(monacoEditor.getSelection()).trim() || monacoEditor.getValue().trim())
        : tab.sql.trim();
      if (!sql) return;
      document.getElementById('btn-explain').disabled = true;
      document.getElementById('btn-run').disabled = true;
      setStatus('Running EXPLAIN…', false);
      api.send('executeExplain', { connId: tab.connId, sql: sql, tabId: tab.id });
    }

    function setStatus(msg, isErr) {
      var el = document.getElementById('query-status');
      el.classList.remove('hidden');
      el.textContent = msg;
      el.className = 'query-status' + (isErr ? ' error' : '');
    }

    function showResultsPlaceholder(msg) {
      var section = document.getElementById('results-section');
      lastResult = null;
      section.innerHTML = '<div class="results-placeholder">' + esc(msg || 'Run a query to see results') + '</div>';
    }

    function renderResults(result) {
      var section = document.getElementById('results-section');
      closeRowDetail();
      if (!result || result.error || !result.columns || !result.columns.length) {
        showResultsPlaceholder(result && result.error ? result.error : 'No rows returned');
        lastResult = null; return;
      }
      lastResult = result;
      var html = '<div class="export-bar">'
        + '<button class="btn btn-secondary btn-xs" id="btn-export-csv"><i class="codicon codicon-export"></i>CSV</button>'
        + '<button class="btn btn-secondary btn-xs" id="btn-export-json"><i class="codicon codicon-json"></i>JSON</button>'
        + '<span style="width:8px"></span>'
        + '<button class="btn btn-secondary btn-xs" id="btn-copy-csv"><i class="codicon codicon-clippy"></i>CSV</button>'
        + '<button class="btn btn-secondary btn-xs" id="btn-copy-json"><i class="codicon codicon-clippy"></i>JSON</button>'
        + '<button class="btn btn-secondary btn-xs" id="btn-copy-md"><i class="codicon codicon-clippy"></i>MD</button>'
        + '</div>';
      html += '<table class="result-grid" id="result-table"><thead><tr>';
      result.columns.forEach(function (c) { html += '<th>' + esc(c) + '</th>'; });
      html += '</tr></thead><tbody>';
      (result.rows || []).forEach(function (row, idx) {
        html += '<tr data-row-idx="' + idx + '">';
        result.columns.forEach(function (c) {
          var v = row[c];
          if (v === null || v === undefined) { html += '<td><span class="result-null">NULL</span></td>'; }
          else if (typeof v === 'object') { html += '<td>' + esc(JSON.stringify(v)) + '</td>'; }
          else { html += '<td>' + esc(String(v)) + '</td>'; }
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      section.innerHTML = html;
      document.getElementById('btn-export-csv').addEventListener('click', function () { exportResult('csv'); });
      document.getElementById('btn-export-json').addEventListener('click', function () { exportResult('json'); });
      document.getElementById('btn-copy-csv').addEventListener('click', function () { copyResult('csv'); });
      document.getElementById('btn-copy-json').addEventListener('click', function () { copyResult('json'); });
      document.getElementById('btn-copy-md').addEventListener('click', function () { copyResult('md'); });
      // row click → detail panel
      section.querySelectorAll('#result-table tbody tr').forEach(function (tr) {
        tr.addEventListener('click', function () { showRowDetail(result, parseInt(tr.dataset.rowIdx, 10), tr); });
      });
    }

    function copyResult(format) {
      if (!lastResult) return;
      var text = '';
      if (format === 'csv') {
        text = lastResult.columns.join(',') + '\n';
        lastResult.rows.forEach(function (row) {
          text += lastResult.columns.map(function (c) {
            var v = row[c];
            if (v === null || v === undefined) return '';
            var s = typeof v === 'object' ? JSON.stringify(v) : String(v);
            return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
          }).join(',') + '\n';
        });
      } else if (format === 'json') {
        text = JSON.stringify(lastResult.rows, null, 2);
      } else if (format === 'md') {
        var sep = '| ' + lastResult.columns.map(function (c) { return c.replace(/\|/g, '\\|'); }).join(' | ') + ' |';
        var div = '| ' + lastResult.columns.map(function () { return '---'; }).join(' | ') + ' |';
        var rows = lastResult.rows.map(function (row) {
          return '| ' + lastResult.columns.map(function (c) {
            var v = row[c];
            var s = v === null || v === undefined ? '' : typeof v === 'object' ? JSON.stringify(v) : String(v);
            return s.replace(/\|/g, '\\|');
          }).join(' | ') + ' |';
        });
        text = [sep, div].concat(rows).join('\n');
      }
      navigator.clipboard.writeText(text).then(function () { showToast('Copied to clipboard'); }).catch(function () {});
    }

    // ── EXPLAIN plan renderer ──────────────────────────────────────────────
    function renderExplain(plan) {
      var section = document.getElementById('results-section');
      if (!plan) { showResultsPlaceholder('No plan returned'); return; }
      lastResult = null;
      var rootPlan = plan[0];
      var execTime = rootPlan['Execution Time'] || 0;
      var planTime = rootPlan['Planning Time'] || 0;

      function renderNode(node, depth) {
        var nodeType = node['Node Type'] || '';
        var totalCost = (node['Total Cost'] || 0).toFixed(2);
        var startCost = (node['Startup Cost'] || 0).toFixed(2);
        var actualTime = node['Actual Total Time'];
        var actualRows = node['Actual Rows'];
        var relation = node['Relation Name'] || node['Index Name'] || '';
        var isSeqScan = nodeType === 'Seq Scan';
        var isDanger = execTime > 0 && actualTime !== undefined && (actualTime / execTime) > 0.5;
        var isWarn = isSeqScan || (execTime > 0 && actualTime !== undefined && (actualTime / execTime) > 0.2);
        var cls = isDanger ? 'plan-danger' : isWarn ? 'plan-warn' : '';
        var indent = depth * 14;
        var html = '<div class="plan-node" style="padding-left:' + indent + 'px">';
        html += '<div class="plan-header ' + cls + '">';
        html += '<span class="plan-type">' + esc(nodeType) + '</span>';
        if (relation) html += ' <span class="plan-rel">' + esc(relation) + '</span>';
        if (node['Alias'] && node['Alias'] !== relation) html += ' <span class="plan-cost">alias: ' + esc(node['Alias']) + '</span>';
        html += '<span class="plan-cost">cost ' + startCost + '..' + totalCost + '</span>';
        if (actualTime !== undefined) html += '<span class="plan-time">⏱ ' + actualTime.toFixed(2) + 'ms</span>';
        if (actualRows !== undefined) html += '<span class="plan-rows">→ ' + actualRows + ' rows</span>';
        if (node['Rows Removed by Filter']) html += '<span class="plan-cost" style="color:var(--vscode-editorWarning-foreground)">filtered ' + node['Rows Removed by Filter'] + '</span>';
        html += '</div>';
        if (node['Plans'] && node['Plans'].length) {
          html += '<div class="plan-children">';
          node['Plans'].forEach(function(child) { html += renderNode(child, depth + 1); });
          html += '</div>';
        }
        html += '</div>';
        return html;
      }

      var treeHtml = '<div class="plan-summary">Planning: <b>' + planTime.toFixed(2) + 'ms</b> &nbsp; Execution: <b>' + execTime.toFixed(2) + 'ms</b></div>'
        + renderNode(rootPlan.Plan, 0);
      var jsonHtml = '<pre class="plan-raw">' + esc(JSON.stringify(plan, null, 2)) + '</pre>';

      section.innerHTML = '<div class="result-toolbar">'
        + '<span style="font-size:11px;font-weight:600;color:var(--vscode-descriptionForeground)">EXPLAIN PLAN</span>'
        + '<span class="result-toolbar-spacer"></span>'
        + '<button class="btn btn-secondary btn-xs" id="btn-plan-tree" style="font-weight:' + (explainViewMode==='tree'?'700':'400') + '">Tree</button>'
        + '<button class="btn btn-secondary btn-xs" id="btn-plan-json" style="font-weight:' + (explainViewMode==='json'?'700':'400') + '">JSON</button>'
        + '</div>'
        + '<div class="plan-wrap" id="plan-tree-view">' + treeHtml + '</div>'
        + '<div id="plan-json-view" style="display:none">' + jsonHtml + '</div>';

      if (explainViewMode === 'json') {
        document.getElementById('plan-tree-view').style.display = 'none';
        document.getElementById('plan-json-view').style.display = '';
      }

      document.getElementById('btn-plan-tree').addEventListener('click', function() {
        explainViewMode = 'tree';
        document.getElementById('plan-tree-view').style.display = '';
        document.getElementById('plan-json-view').style.display = 'none';
        document.getElementById('btn-plan-tree').style.fontWeight = '700';
        document.getElementById('btn-plan-json').style.fontWeight = '400';
      });
      document.getElementById('btn-plan-json').addEventListener('click', function() {
        explainViewMode = 'json';
        document.getElementById('plan-tree-view').style.display = 'none';
        document.getElementById('plan-json-view').style.display = '';
        document.getElementById('btn-plan-tree').style.fontWeight = '400';
        document.getElementById('btn-plan-json').style.fontWeight = '700';
      });
    }

    // ── Autocomplete ───────────────────────────────────────────────────────
    function registerCompletions(data) {
      if (!monacoReady) return;
      if (completionProvider) completionProvider.dispose();
      completionProvider = monaco.languages.registerCompletionItemProvider('sql', {
        provideCompletionItems: function (model, position) {
          var word = model.getWordUntilPosition(position);
          var range = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber, startColumn: word.startColumn, endColumn: word.endColumn };
          var suggestions = [];
          (data.tables || []).forEach(function (t) {
            suggestions.push({ label: t.name, kind: monaco.languages.CompletionItemKind.Class, insertText: t.name, range: range, detail: t.schema + ' · ' + (t.type === 'view' ? 'View' : 'Table') });
            suggestions.push({ label: t.schema + '.' + t.name, kind: monaco.languages.CompletionItemKind.Class, insertText: t.schema + '.' + t.name, range: range, detail: t.type === 'view' ? 'View' : 'Table' });
          });
          (data.functions || []).forEach(function (f) {
            suggestions.push({ label: f.name, kind: monaco.languages.CompletionItemKind.Function, insertText: f.name + '()', range: range, detail: f.schema + ' · Function' });
          });
          return { suggestions: suggestions };
        }
      });
    }

    function renderPrismaModels() {
      var body = document.getElementById('prisma-models-body');
      var badge = document.getElementById('prisma-models-badge');
      if (!prismaSchema || !prismaSchema.models.length) {
        body.innerHTML = '<div class="no-schema-msg">No models found.</div>';
        if (badge) badge.textContent = '';
        return;
      }
      if (badge) badge.textContent = '(' + prismaSchema.models.length + ')';
      var html = '';
      prismaSchema.models.forEach(function (model) {
        var found = null; var foundSchema = null;
        if (prismaConnId) {
          Object.keys(tables).forEach(function (key) {
            if (!key.startsWith(prismaConnId + ':')) return;
            var sc = key.slice(prismaConnId.length + 1);
            var tList = tables[key];
            if (tList) {
              var match = tList.find(function (t) { return t.name === model.tableName || t.name.toLowerCase() === model.tableName.toLowerCase(); });
              if (match && !found) { found = match; foundSchema = sc; }
            }
          });
        }
        var mapNote = model.tableName !== model.name ? ' <span class="model-map">→ ' + esc(model.tableName) + '</span>' : '';
        var statusHtml = prismaConnId
          ? (found ? '<span class="model-status-ok">✓</span>' : '<span class="model-status-miss">✗</span>')
          : '<span class="model-status-unk">?</span>';
        var driftBtn = (found && foundSchema)
          ? '<button class="btn-icon" data-action="open-drift" data-conn-id="' + esc(prismaConnId) + '" data-schema="' + esc(foundSchema) + '" data-table-name="' + esc(model.tableName) + '" data-model-name="' + esc(model.name) + '" title="View Drift"><i class="codicon codicon-diff"></i></button>'
          : '';
        html += '<div class="model-row">'
          + '<i class="codicon codicon-symbol-class" style="font-size:13px;flex-shrink:0"></i>'
          + '<span class="model-name">' + esc(model.name) + '</span>'
          + mapNote + statusHtml + driftBtn + '</div>';
      });
      body.innerHTML = html;
      body.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-action="open-drift"]');
        if (!btn) return;
        var d = btn.dataset;
        api.send('openDrift', { connId: d.connId, schema: d.schema, tableName: d.tableName, modelName: d.modelName });
      });
    }

    function renderPrismaMigrations() {
      var body = document.getElementById('prisma-migrations-body');
      if (!prismaConnId) { body.innerHTML = '<div class="no-schema-msg">Select a connection to load migrations.</div>'; return; }
      if (!migrationsHasTable) { body.innerHTML = '<div class="no-schema-msg">Table _prisma_migrations not found in this database.</div>'; return; }
      if (!migrations.length) { body.innerHTML = '<div class="no-schema-msg">No migrations found.</div>'; return; }
      body.innerHTML = migrations.map(function (m) {
        var icon, cls;
        if (m.rolledBackAt) { icon = '↩'; cls = 'mig-rb'; }
        else if (m.logs) { icon = '✗'; cls = 'mig-fail'; }
        else if (m.finishedAt) { icon = '✓'; cls = 'mig-ok'; }
        else { icon = '⧖'; cls = 'mig-rb'; }
        var date = m.finishedAt ? new Date(m.finishedAt).toLocaleDateString() : (m.logs ? 'FAILED' : 'pending');
        return '<div class="migration-row"><span class="' + cls + '">' + icon + '</span><span class="migration-name" title="' + esc(m.migrationName) + '">' + esc(m.migrationName) + '</span><span class="migration-date">' + esc(date) + '</span></div>';
      }).join('');
    }

    // ── Drift overlay ──────────────────────────────────────────────────────
    document.getElementById('drift-close').addEventListener('click', function () {

    function showDrift(d) {
      document.getElementById('drift-title').textContent = 'Drift: ' + d.modelName + ' ↔ ' + d.schema + '.' + d.tableName;
      var prismaFields = d.model.fields || [];
      var dbCols = d.columns || [];

      var prismaMap = {};
      prismaFields.forEach(function (f) { prismaMap[f.columnName] = f; });
      var dbMap = {};
      dbCols.forEach(function (c) { dbMap[c.name] = c; });

      var allKeys = Array.from(new Set(prismaFields.map(function (f) { return f.columnName; }).concat(dbCols.map(function (c) { return c.name; }))));

      var html = '<table class="drift-table"><thead><tr><th>Column</th><th>Prisma type</th><th>DB type</th><th>Status</th></tr></thead><tbody>';
      allKeys.forEach(function (key) {
        var pf = prismaMap[key];
        var dc = dbMap[key];
        var status, cls;
        if (pf && dc) { status = '✓ Match'; cls = 'drift-ok'; }
        else if (pf && !dc) { status = '✗ Missing in DB'; cls = 'drift-miss'; }
        else { status = '⚠ Extra in DB'; cls = 'drift-extra'; }
        html += '<tr><td>' + esc(key) + '</td>'
          + '<td>' + (pf ? esc(pf.prismaType) : '—') + '</td>'
          + '<td>' + (dc ? esc(dc.dataType) : '—') + '</td>'
          + '<td class="' + cls + '">' + status + '</td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('drift-body').innerHTML = html;
      document.getElementById('drift-overlay').classList.remove('hidden');
    }

    // ── Messages from main process ─────────────────────────────────────────
    api.onMessage(function (msg) {
      var d = msg.data;
      switch (msg.command) {
        case 'updateConnections':
          connections = d || [];
          renderTree();
          if (!document.getElementById('view-form').classList.contains('hidden')) showTree();
          if (persisted.tab === 'query') renderConnSelect();
          if (persisted.tab === 'prisma') renderPrismaConnSelect();
          break;
        case 'updateStatuses':
          statuses = d || {}; renderTree(); break;
        case 'connectionStatus': {
          statuses[d.id] = d.status; delete loadingNodes['c:' + d.id];
          if (d.status === 'connected') { expanded['c:' + d.id] = true; loadingNodes['c:' + d.id] = true; api.send('loadSchemas', { connId: d.id }); }
          else if (d.status !== 'connecting') { delete schemas[d.id]; }
          renderTree();
          if (persisted.tab === 'query') renderConnSelect();
          break;
        }
        case 'schemasLoaded': schemas[d.connId] = d.schemas; delete loadingNodes['c:' + d.connId]; renderTree(); break;
        case 'tablesLoaded':  tables[d.connId + ':' + d.schema] = d.tables; delete loadingNodes['tg:' + d.connId + ':' + d.schema]; renderTree(); break;
        case 'columnsLoaded': cols[d.connId + ':' + d.schema + ':' + d.table] = d.columns; delete loadingNodes[(d.isView ? 'v:' : 't:') + d.connId + ':' + d.schema + ':' + d.table]; renderTree(); break;
        case 'functionsLoaded': funcs[d.connId + ':' + d.schema] = d.functions; delete loadingNodes['fg:' + d.connId + ':' + d.schema]; renderTree(); break;
        case 'funcParamsLoaded': funcParams[d.connId + ':' + d.schema + ':' + d.specificName] = d.params; delete loadingNodes['f:' + d.connId + ':' + d.schema + ':' + d.specificName]; renderTree(); break;
        case 'testResult': {
          var ts = document.getElementById('test-status');
          if (d.success) { ts.textContent = 'Connected successfully!'; ts.className = 'test-status success'; }
          else { ts.textContent = d.message || 'Connection failed'; ts.className = 'test-status error'; }
          break;
        }
        case 'formError':
          showToast(d); break;
        case 'queryResult': {
          var tab = tabs.find(function (t) { return t.id === d.tabId; });
          if (tab) tab.result = d;
          stopRunning();
          if (!d.tabId || d.tabId === activeQTabId) {
            if (d.error) {
              setStatus(d.error, true);
              if (d.isTimeout) showToast('Query timed out. Check your connection settings.');
              renderResults(null);
            } else {
              setStatus(d.rowCount + ' rows · ' + d.durationMs + 'ms', false);
              renderResults(d);
            }
          }
          break;
        }
        case 'explainResult': {
          document.getElementById('btn-explain').disabled = false;
          stopRunning();
          var xtab = tabs.find(function(t) { return t.id === d.tabId; });
          if (xtab) xtab.result = d.error ? { error: d.error } : { isPlan: true };
          if (!d.tabId || d.tabId === activeQTabId) {
            if (d.error) {
              setStatus('EXPLAIN error: ' + d.error, true);
              showResultsPlaceholder('EXPLAIN error: ' + d.error);
            } else {
              setStatus('Query plan ready', false);
              renderExplain(d.plan);
            }
          }
          break;
        }
        case 'historyLoaded': historyEntries = d || []; renderHistory(); break;
        case 'completionsLoaded': registerCompletions(d); break;
        case 'prismaSchema':
          prismaSchema = d;
          renderPrismaSchemaInfo(); renderPrismaModels(); renderPrismaTabBadge();
          break;
        case 'migrationsLoaded':
          migrationsHasTable = d.hasTable; migrations = d.entries || [];
          renderPrismaMigrations(); break;
        case 'prismaLog': {
          prismaLog += d.text;
          var logEl = document.getElementById('prisma-log');
          if (logEl) { logEl.textContent = prismaLog; logEl.scrollTop = logEl.scrollHeight; }
          break;
        }
        case 'settings':
          settings = Object.assign(settings, d); break;
        case 'reconnect':
          statuses[d.connId] = 'connecting'; renderTree();
          api.send('connect', { connId: d.connId }); break;
        case 'tableEstimatesLoaded': {
          var ekey = d.connId + ':' + d.schema;
          if (!estimates[ekey]) estimates[ekey] = {};
          Object.assign(estimates[ekey], d.estimates);
          renderTree(); break;
        }
        case 'navigateToTable':
          // Explorer is always visible in the sidebar — just expand the tree
          expanded['c:' + d.connId] = true;
          expanded['s:' + d.connId + ':' + d.schema] = true;
          expanded['tg:' + d.connId + ':' + d.schema] = true;
          if (!tables[d.connId + ':' + d.schema] && !loadingNodes['tg:' + d.connId + ':' + d.schema]) {
            loadingNodes['tg:' + d.connId + ':' + d.schema] = true;
            api.send('loadTables', { connId: d.connId, schema: d.schema });
          }
          renderTree(); break;
        case 'driftResult':
          showDrift(d); break;
        case 'activityLoaded': {
          var statusEl2 = document.getElementById('activity-status');
          var resultsEl = document.getElementById('activity-results');
          if (!resultsEl) break;
          if (d.error) {
            if (statusEl2) statusEl2.textContent = 'Error';
            resultsEl.innerHTML = '<div class="results-placeholder">' + esc(d.error) + '</div>';
            break;
          }
          if (statusEl2) statusEl2.textContent = d.rows.length + ' rows · ' + new Date().toLocaleTimeString();
          if (!d.rows.length) { resultsEl.innerHTML = '<div class="results-placeholder">No active connections</div>'; break; }
          var cols2 = ['pid','usename','application_name','state','wait_event','duration','query'];
          var ahtml = '<table class="activity-table"><thead><tr>' + cols2.map(function (c) { return '<th>' + c + '</th>'; }).join('') + '<th></th></tr></thead><tbody>';
          d.rows.forEach(function (row) {
            var dur = parseFloat(row.duration) || 0;
            var cls = dur > 30 ? 'activity-danger' : dur > 5 ? 'activity-warn' : '';
            ahtml += '<tr class="' + cls + '">';
            cols2.forEach(function (c) {
              var v = row[c];
              var s = v === null || v === undefined ? '' : String(v);
              ahtml += '<td title="' + esc(s) + '">' + esc(s.length > 40 ? s.slice(0, 40) + '…' : s) + '</td>';
            });
            ahtml += '<td><button class="activity-btn" data-pid="' + esc(String(row.pid)) + '" data-conn-id="' + esc(d.connId) + '">Cancel</button></td>';
            ahtml += '</tr>';
          });
          ahtml += '</tbody></table>';
          resultsEl.innerHTML = ahtml;
          resultsEl.querySelectorAll('.activity-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
              api.send('cancelActivity', { connId: btn.dataset.connId, pid: parseInt(btn.dataset.pid, 10) });
            });
          });
          break;
        }
        case 'tableDetailLoaded': {
          var td = tableTabs.find(function(t) {
            return t.connId === d.connId && t.schema === d.schema && t.tableName === d.tableName;
          });
          if (!td) break;
          td.loading = false;
          if (d.error) { td.error = d.error; }
          else { td.data = d.detail; }
          renderTableTabs();
          if (activeTableTabId === td.id) renderActiveTableDetail();
          break;
        }
      }
    });

    // ── SQL formatter (#47) ────────────────────────────────────────────────
    function formatSQL() {
      if (!monacoEditor) return;
      var sql = monacoEditor.getValue();
      var kws = ['SELECT','FROM','WHERE','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','CROSS JOIN',
        'ON','AND','OR','NOT','IN','BETWEEN','LIKE','IS','NULL','AS','ORDER BY','GROUP BY','HAVING',
        'LIMIT','OFFSET','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','CREATE TABLE','ALTER TABLE',
        'DROP TABLE','CREATE INDEX','UNION','UNION ALL','EXCEPT','INTERSECT','WITH','CASE','WHEN','THEN',
        'ELSE','END','DISTINCT','EXISTS','COUNT','SUM','AVG','MIN','MAX','COALESCE','NULLIF'];
      // tokenize preserving strings and identifiers
      var out = sql;
      // uppercase keywords (simple pass — not perfect but good for common SQL)
      kws.forEach(function (kw) {
        var re = new RegExp('\\b' + kw.replace(/ /g, '\\s+') + '\\b', 'gi');
        out = out.replace(re, kw);
      });
      // normalize whitespace around commas in SELECT list (keep newlines intentional)
      out = out.replace(/[ \t]*,[ \t]*/g, ', ');
      // add newline before major clauses
      var clauses = ['FROM','WHERE','AND','OR','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN',
        'ON','ORDER BY','GROUP BY','HAVING','LIMIT','OFFSET','UNION ALL','UNION','EXCEPT','INTERSECT'];
      clauses.forEach(function (c) {
        out = out.replace(new RegExp('([^\\n])\\s+\\b(' + c + ')\\b', 'gi'), function (m, pre, kw) {
          return pre + '\n' + kw.toUpperCase();
        });
      });
      // clean up leading/trailing whitespace per line
      out = out.split('\n').map(function (l) { return l.trimEnd(); }).join('\n').trim();
      monacoEditor.setValue(out);
      activeQTab().sql = out;
    }

    // ── Activity panel (#53) ───────────────────────────────────────────────
    var activityTimer = null;

    function renderActivityConnSelect() {
      var sel = document.getElementById('activity-conn-select');
      if (!sel) return;
      sel.innerHTML = '<option value="">Select connection…</option>'
        + connections.map(function (c) {
            var s = statuses[c.id] || 'disconnected';
            return '<option value="' + esc(c.id) + '">' + esc(c.label) + (s === 'connected' ? ' ●' : ' ○') + '</option>';
          }).join('');
    }

    function loadActivity() {
      var sel = document.getElementById('activity-conn-select');
      if (!sel || !sel.value) return;
      document.getElementById('activity-status').textContent = 'Loading…';
      api.send('loadActivity', { connId: sel.value });
    }

    document.getElementById('btn-activity-refresh').addEventListener('click', loadActivity);

    document.getElementById('activity-conn-select').addEventListener('change', function () {
      if (this.value) loadActivity();
    });

    document.getElementById('activity-auto-refresh').addEventListener('change', function () {
      clearInterval(activityTimer);
      if (this.checked) activityTimer = setInterval(loadActivity, 5000);
    });

    // ── Copy Prisma model (#55) ────────────────────────────────────────────
    var PG_TO_PRISMA = {
      'int2': 'Int', 'int4': 'Int', 'int8': 'BigInt', 'integer': 'Int', 'smallint': 'Int',
      'bigint': 'BigInt', 'serial': 'Int', 'bigserial': 'BigInt', 'smallserial': 'Int',
      'float4': 'Float', 'float8': 'Float', 'real': 'Float', 'double precision': 'Float',
      'numeric': 'Decimal', 'decimal': 'Decimal', 'money': 'Decimal',
      'bool': 'Boolean', 'boolean': 'Boolean',
      'text': 'String', 'varchar': 'String', 'character varying': 'String',
      'char': 'String', 'character': 'String', 'bpchar': 'String', 'citext': 'String',
      'uuid': 'String', 'json': 'Json', 'jsonb': 'Json',
      'timestamp': 'DateTime', 'timestamptz': 'DateTime', 'timestamp without time zone': 'DateTime',
      'timestamp with time zone': 'DateTime', 'date': 'DateTime', 'time': 'String', 'timetz': 'String',
      'bytea': 'Bytes', 'bit': 'String', 'inet': 'String', 'cidr': 'String', 'macaddr': 'String',
    };

    function toPrismaType(pgType) {
      var base = pgType.replace(/\(.*\)/, '').trim().toLowerCase();
      return PG_TO_PRISMA[base] || 'String';
    }

    function toPascalCase(s) {
      return s.split(/[_\s]+/).map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join('');
    }

    function generatePrismaModel(tab) {
      var d = tab.data;
      var modelName = toPascalCase(tab.tableName);
      var needsMap = modelName.toLowerCase() !== tab.tableName.toLowerCase();
      var lines = ['model ' + modelName + ' {'];
      d.columns.forEach(function (c) {
        var prismaType = toPrismaType(c.dataType);
        var attrs = [];
        if (c.isPrimaryKey) {
          attrs.push('@id');
          if (c.columnDefault && c.columnDefault.toLowerCase().includes('nextval')) attrs.push('@default(autoincrement())');
          else if (c.columnDefault && c.columnDefault.toLowerCase().includes('uuid')) attrs.push('@default(uuid())');
          else if (c.columnDefault && c.columnDefault.toLowerCase().includes('now')) attrs.push('@default(now())');
        } else if (c.columnDefault) {
          if (c.columnDefault.toLowerCase().includes('now()')) attrs.push('@default(now())');
        }
        var fieldName = c.name.replace(/[^a-zA-Z0-9_]/g, '_');
        if (fieldName !== c.name) attrs.push('@map("' + c.name + '")');
        var line = '  ' + fieldName + (c.isNullable ? '?' : '') + '  ' + prismaType + (c.isNullable ? '?' : '');
        if (attrs.length) line += '  ' + attrs.join(' ');
        lines.push(line);
      });
      if (needsMap) lines.push('', '  @@map("' + tab.tableName + '")');
      lines.push('}');
      return lines.join('\n');
    }

    document.getElementById('btn-copy-prisma-model').addEventListener('click', function () {
      var tab = tableTabs.find(function (t) { return t.id === activeTableTabId; });
      if (!tab || !tab.data) { showToast('Table not loaded yet'); return; }
      var model = generatePrismaModel(tab);
      navigator.clipboard.writeText(model).then(function () { showToast('Prisma model copied to clipboard'); }).catch(function () {});
    });

    // ── Global keyboard shortcuts ──────────────────────────────────────────
    document.addEventListener('keydown', function (e) {
      if (e.key === 'F8' && persisted.tab === 'query') {
        e.preventDefault(); runQuery();
      }
      if (e.key === 't' && (e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
        e.preventDefault(); newQTab();
      }
    });

    // ── Init ───────────────────────────────────────────────────────────────
    switchMainTab(persisted.tab || 'query');
    renderTree();
    api.send('ready');
  }());
  </script>
