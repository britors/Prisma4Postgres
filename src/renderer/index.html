<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; worker-src blob:; connect-src https://cdn.jsdelivr.net;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./codicon.css">
  <title>Prisma4Postgres</title>
  <style>
    /* ── OpenBase.Theme colors ── https://github.com/britors/OpenBase.Theme ── */
    :root {
      color-scheme: dark;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
      --vscode-font-size: 13px;
      --vscode-foreground: #e2e2f0;
      --vscode-sideBar-background: #090b14;
      --vscode-editorGroupHeader-tabsBackground: #080a12;
      --vscode-panel-border: #1e2040;
      --vscode-editor-background: #0d0f1a;
      --vscode-input-background: #0a0c16;
      --vscode-input-foreground: #e2e2f0;
      --vscode-input-border: #1e2040;
      --vscode-button-background: #b44fff;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #c868ff;
      --vscode-button-secondaryBackground: #1e2040;
      --vscode-button-secondaryForeground: #e2e2f0;
      --vscode-button-secondaryHoverBackground: #2a2d5a;
      --vscode-focusBorder: #b44fff;
      --vscode-tab-activeForeground: #e2e2f0;
      --vscode-tab-inactiveForeground: #4a4a6a;
      --vscode-tab-activeBackground: #0d0f1a;
      --vscode-tab-hoverBackground: #131629;
      --vscode-list-hoverBackground: #131629;
      --vscode-badge-background: #ff5f57;
      --vscode-badge-foreground: #ffffff;
      --vscode-dropdown-background: #131629;
      --vscode-dropdown-foreground: #e2e2f0;
      --vscode-dropdown-border: #1e2040;
      --vscode-descriptionForeground: #8888aa;
      --vscode-icon-foreground: #8e8e93;
      --vscode-toolbar-hoverBackground: #b44fff22;
      --vscode-textLink-foreground: #6ea6ff;
      --vscode-errorForeground: #ff5572;
      --vscode-testing-iconPassed: #3dd68c;
      --vscode-editorWarning-foreground: #ffcc66;
      --vscode-progressBar-background: #b44fff;
      --vscode-sideBarSectionHeader-background: #0d0f1a;
      --vscode-sideBarSectionHeader-foreground: #8888aa;
      --vscode-sideBarSectionHeader-border: #1e2040;
      --vscode-textPreformat-foreground: #00d4aa;
      --vscode-terminal-background: #0d0f1a;
      --vscode-terminal-foreground: #e2e2f0;
      --vscode-editor-font-family: 'Cascadia Code', 'Droid Sans Mono', 'monospace', monospace;
      --vscode-editor-findMatchHighlightBackground: #ff3fa433;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      color: var(--vscode-foreground);
      background: var(--vscode-sideBar-background);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: row;
    }
    .hidden { display: none !important; }

    /* ── Sidebar ── */
    .sidebar {
      display: flex; flex-direction: column;
      flex-shrink: 0;
      width: var(--sidebar-width, 240px);
      min-width: 160px; max-width: 600px;
      border-right: 1px solid var(--vscode-panel-border);
      background: var(--vscode-sideBar-background);
      overflow: hidden;
    }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 8px 4px 10px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--vscode-sideBarSectionHeader-foreground, var(--vscode-descriptionForeground));
      background: var(--vscode-sideBarSectionHeader-background);
      border-bottom: 1px solid var(--vscode-sideBarSectionHeader-border, var(--vscode-panel-border));
      flex-shrink: 0; user-select: none;
    }
    .sidebar-header-actions { display: flex; gap: 1px; }
    .resize-handle {
      width: 4px; flex-shrink: 0; cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
    }
    .resize-handle:hover, .resize-handle.dragging { background: var(--vscode-focusBorder); }
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Tab bar (right side only: Query / History / Prisma) ── */
    .tab-bar {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--vscode-panel-border);
      background: var(--vscode-editorGroupHeader-tabsBackground);
    }
    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; background: transparent;
      border: none; border-bottom: 2px solid transparent;
      color: var(--vscode-tab-inactiveForeground); cursor: pointer;
      font-size: var(--vscode-font-size); font-family: var(--vscode-font-family);
      white-space: nowrap; letter-spacing: 0.01em;
    }
    .tab .codicon { font-size: 14px; opacity: 0.8; }
    .tab.active { color: var(--vscode-tab-activeForeground); border-bottom-color: var(--vscode-focusBorder); background: var(--vscode-tab-activeBackground); }
    .tab.active .codicon { opacity: 1; }
    .tab:hover:not(.active) { background: var(--vscode-tab-hoverBackground); color: var(--vscode-foreground); }

    .panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .view  { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .search-bar { display: flex; align-items: center; gap: 4px; padding: 4px 6px; border-bottom: 1px solid var(--vscode-panel-border); flex-shrink: 0; }
    .search-icon { color: var(--vscode-descriptionForeground); flex-shrink: 0; font-size: 14px; }
    .search-input { flex: 1; background: transparent; border: none; outline: none; color: var(--vscode-foreground); font-size: var(--vscode-font-size); font-family: var(--vscode-font-family); padding: 0; }
    .search-input::placeholder { color: var(--vscode-descriptionForeground); }
    .search-clear { background: transparent; border: none; cursor: pointer; color: var(--vscode-descriptionForeground); padding: 0; display: flex; align-items: center; }
    .search-clear:hover { color: var(--vscode-foreground); }

    .tree { flex: 1; overflow-y: auto; padding: 2px 0; }
    .tree-row { display: flex; align-items: center; height: 22px; padding-right: 8px; cursor: default; user-select: none; }
    .tree-row:hover { background: var(--vscode-list-hoverBackground); }
    .indent { flex-shrink: 0; display: inline-block; }
    .toggle { flex-shrink: 0; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .codicon-modifier-spin { animation: spin 1.2s linear infinite; display: inline-flex; }
    .tree-icon { flex-shrink: 0; margin-right: 4px; width: 16px; display: inline-flex; align-items: center; justify-content: center; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 5px; }
    .status-dot.connected    { background: var(--vscode-testing-iconPassed, #73c991); }
    .status-dot.disconnected { background: var(--vscode-foreground); opacity: 0.3; }
    .status-dot.connecting   { background: var(--vscode-progressBar-background, #0e70c0); }
    .status-dot.error        { background: var(--vscode-errorForeground, #f48771); }
    .tree-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-label mark { background: var(--vscode-editor-findMatchHighlightBackground, rgba(234,92,0,0.33)); color: inherit; border-radius: 2px; }
    .tree-badge { flex-shrink: 0; font-size: 10px; background: var(--vscode-badge-background); color: var(--vscode-badge-foreground); border-radius: 10px; padding: 0 5px; margin-left: 4px; min-width: 18px; text-align: center; }
    .tree-actions { display: none; align-items: center; gap: 1px; flex-shrink: 0; margin-left: 4px; }
    .tree-row:hover .tree-actions { display: flex; }
    .col-type { flex-shrink: 0; font-size: 10px; color: var(--vscode-descriptionForeground); margin-left: 4px; font-style: italic; }
    .col-badge { flex-shrink: 0; font-size: 9px; font-weight: 700; border-radius: 2px; padding: 0 3px; margin-left: 3px; line-height: 14px; }
    .col-badge.pk { background: #cca700; color: #000; }
    .col-badge.fk { background: #007acc; color: #fff; }
    .list-footer { padding: 8px 12px; border-top: 1px solid var(--vscode-panel-border); flex-shrink: 0; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border: none; cursor: pointer; font-size: var(--vscode-font-size); font-family: var(--vscode-font-family); }
    .btn-primary   { background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
    .btn-primary:hover { background: var(--vscode-button-hoverBackground); }
    .btn-secondary { background: var(--vscode-button-secondaryBackground); color: var(--vscode-button-secondaryForeground); }
    .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground); }
    .btn:disabled  { opacity: 0.5; cursor: not-allowed; }
    .btn-icon { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: transparent; border: none; cursor: pointer; color: var(--vscode-icon-foreground); border-radius: 2px; }
    .btn-icon:hover { background: var(--vscode-toolbar-hoverBackground); }
    .btn-icon.btn-danger:hover { color: var(--vscode-errorForeground); }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--vscode-descriptionForeground); padding: 24px; text-align: center; }

    .form-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--vscode-panel-border); flex-shrink: 0; }
    .form-header span { font-weight: 500; }
    .form-body { padding: 12px; overflow-y: auto; flex: 1; }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    label { font-size: 11px; color: var(--vscode-descriptionForeground); text-transform: uppercase; letter-spacing: 0.5px; }
    input[type="text"], input[type="number"], input[type="password"] {
      padding: 4px 8px; background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border, transparent); outline: none;
      font-size: var(--vscode-font-size); font-family: var(--vscode-font-family); width: 100%;
    }
    input:focus { border-color: var(--vscode-focusBorder); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; }
    .checkbox-row label { text-transform: none; letter-spacing: normal; font-size: var(--vscode-font-size); color: var(--vscode-foreground); cursor: pointer; }
    .form-actions { display: flex; align-items: center; gap: 8px; padding-top: 12px; border-top: 1px solid var(--vscode-panel-border); margin-top: 4px; flex-wrap: wrap; }
    .test-status { font-size: 11px; flex: 1; }
    .test-status.success { color: var(--vscode-testing-iconPassed, #73c991); }
    .test-status.error   { color: var(--vscode-errorForeground); }
    .test-status.testing { color: var(--vscode-descriptionForeground); }

    .query-tabs-bar { display: flex; align-items: stretch; flex-shrink: 0; border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-editorGroupHeader-tabsBackground); overflow-x: auto; }
    .query-tab-list { display: flex; flex: 1; overflow-x: auto; }
    .query-tab { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-right: 1px solid var(--vscode-panel-border); cursor: pointer; white-space: nowrap; min-width: 80px; max-width: 140px; font-size: var(--vscode-font-size); }
    .query-tab:hover { background: var(--vscode-tab-hoverBackground); }
    .query-tab.active { background: var(--vscode-tab-activeBackground); color: var(--vscode-tab-activeForeground); border-bottom: 2px solid var(--vscode-focusBorder); }
    .query-tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .query-tab-close { width: 14px; height: 14px; font-size: 11px; flex-shrink: 0; padding: 0; background: transparent; border: none; cursor: pointer; color: var(--vscode-icon-foreground); border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; }
    .query-tab-close:hover { background: var(--vscode-toolbar-hoverBackground); }
    .query-tab-close.invisible { visibility: hidden; pointer-events: none; }
    .btn-new-tab { flex-shrink: 0; align-self: center; margin: 0 4px; }

    .query-toolbar { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-bottom: 1px solid var(--vscode-panel-border); flex-shrink: 0; }
    .conn-select { flex: 1; background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground); border: 1px solid var(--vscode-dropdown-border, transparent); padding: 2px 4px; font-size: var(--vscode-font-size); font-family: var(--vscode-font-family); outline: none; max-width: 180px; }

    /* ── Query split pane ── */
    .query-split { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .query-editor-pane { display: flex; flex-direction: column; overflow: hidden; min-height: 80px; }
    #monaco-container { flex: 1; min-height: 0; overflow: hidden; }
    .query-h-resize {
      height: 4px; flex-shrink: 0; cursor: row-resize; background: transparent;
      border-top: 1px solid var(--vscode-panel-border);
      transition: background 0.15s;
    }
    .query-h-resize:hover, .query-h-resize.dragging { background: var(--vscode-focusBorder); }
    .query-results-pane { display: flex; flex-direction: column; overflow: hidden; min-height: 80px; }

    .query-status { padding: 2px 8px; font-size: 11px; flex-shrink: 0; color: var(--vscode-descriptionForeground); background: var(--vscode-editorGroupHeader-tabsBackground); border-top: 1px solid var(--vscode-panel-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .query-status.error { color: var(--vscode-errorForeground); }

    .results-section { flex: 1; overflow: auto; }
    .results-placeholder { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--vscode-descriptionForeground); font-style: italic; font-size: 12px; }
    .result-grid { width: max-content; min-width: 100%; border-collapse: collapse; }
    .result-grid th { position: sticky; top: 0; z-index: 1; background: var(--vscode-editorGroupHeader-tabsBackground); padding: 3px 8px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--vscode-panel-border); white-space: nowrap; font-size: 11px; }
    .result-grid td { padding: 2px 8px; border-bottom: 1px solid rgba(128,128,128,0.1); white-space: nowrap; font-size: 11px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
    .result-grid tr:hover { background: var(--vscode-list-hoverBackground); }
    .result-null { color: var(--vscode-descriptionForeground); font-style: italic; }

    .plan-wrap { padding: 8px; overflow: auto; font-size: 11px; }
    .plan-summary { margin-bottom: 8px; color: var(--vscode-descriptionForeground); font-size: 11px; }
    .plan-node { padding: 1px 0 1px 12px; border-left: 1px solid rgba(128,128,128,0.2); margin: 1px 0; }
    .plan-header { display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px; padding: 3px 4px; border-radius: 2px; cursor: pointer; }
    .plan-header:hover { background: var(--vscode-list-hoverBackground); }
    .plan-type { font-weight: 600; }
    .plan-rel  { color: var(--vscode-textLink-foreground); }
    .plan-cost { color: var(--vscode-descriptionForeground); font-size: 10px; }
    .plan-time { font-size: 10px; color: var(--vscode-descriptionForeground); }
    .plan-rows { font-size: 10px; color: var(--vscode-descriptionForeground); }
    .plan-warn .plan-type { color: var(--vscode-editorWarning-foreground, #cca700); }
    .plan-danger .plan-type { color: var(--vscode-errorForeground, #f48771); }
    .plan-children { padding-left: 0; }
    .plan-raw { font-family: var(--vscode-editor-font-family,monospace); font-size: 11px; white-space: pre-wrap; padding: 8px; overflow: auto; }
    .result-toolbar { display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-editorGroupHeader-tabsBackground); flex-shrink: 0; }
    .result-toolbar-spacer { flex: 1; }

    .history-list { flex: 1; overflow-y: auto; }
    .history-item { padding: 6px 12px; border-bottom: 1px solid rgba(128,128,128,0.08); cursor: pointer; }
    .history-item:hover { background: var(--vscode-list-hoverBackground); }
    .history-sql { font-family: var(--vscode-editor-font-family, monospace); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .history-meta { display: flex; gap: 8px; font-size: 10px; color: var(--vscode-descriptionForeground); }

    .export-bar { display: flex; align-items: center; gap: 4px; padding: 3px 6px; border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-editorGroupHeader-tabsBackground); flex-shrink: 0; }
    .btn-xs { padding: 1px 7px; font-size: 11px; }
    .result-grid tr.row-selected { background: var(--vscode-list-activeSelectionBackground) !important; color: var(--vscode-list-activeSelectionForeground); }
    .result-grid tr { cursor: pointer; }
    .row-detail-kv { display: flex; flex-direction: column; gap: 6px; }
    .row-detail-kv-item { display: flex; flex-direction: column; gap: 1px; }
    .row-detail-kv-key { font-size: 10px; font-weight: 600; color: var(--vscode-descriptionForeground); text-transform: uppercase; letter-spacing: 0.5px; }
    .row-detail-kv-val { font-size: 12px; font-family: var(--vscode-editor-font-family, monospace); word-break: break-all; white-space: pre-wrap; padding: 2px 4px; border-radius: 2px; background: var(--vscode-input-background); }
    .activity-table { width: 100%; border-collapse: collapse; }
    .activity-table th { position: sticky; top: 0; z-index: 1; background: var(--vscode-editorGroupHeader-tabsBackground); padding: 3px 8px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--vscode-panel-border); font-size: 11px; }
    .activity-table td { padding: 2px 8px; border-bottom: 1px solid rgba(128,128,128,0.1); font-size: 11px; white-space: nowrap; max-width: 240px; overflow: hidden; text-overflow: ellipsis; }
    .activity-table tr:hover { background: var(--vscode-list-hoverBackground); }
    .activity-warn { color: #e8a838; }
    .activity-danger { color: #f44747; }
    .activity-btn { padding: 1px 5px; font-size: 10px; cursor: pointer; border: 1px solid var(--vscode-panel-border); border-radius: 2px; background: var(--vscode-button-secondaryBackground); color: var(--vscode-button-secondaryForeground); }

    .prisma-scroll { flex: 1; overflow-y: auto; }
    .prisma-section { border-bottom: 1px solid var(--vscode-panel-border); }
    .prisma-section-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--vscode-descriptionForeground); cursor: pointer; user-select: none; background: var(--vscode-sideBarSectionHeader-background); }
    .prisma-section-header:hover { background: var(--vscode-list-hoverBackground); }
    .prisma-section-body { padding: 6px 10px; }
    .prisma-info-row { display: flex; align-items: baseline; gap: 6px; padding: 2px 0; font-size: 12px; }
    .prisma-info-label { color: var(--vscode-descriptionForeground); font-size: 11px; flex-shrink: 0; }
    .prisma-actions-row { display: flex; gap: 6px; padding: 6px 0 2px; flex-wrap: wrap; }
    .model-row { display: flex; align-items: center; gap: 5px; padding: 3px 0; font-size: 12px; }
    .model-name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .model-map  { color: var(--vscode-descriptionForeground); font-size: 11px; }
    .model-status-ok   { color: var(--vscode-testing-iconPassed,#73c991); font-size: 11px; }
    .model-status-miss { color: var(--vscode-errorForeground,#f48771); font-size: 11px; }
    .model-status-unk  { color: var(--vscode-descriptionForeground); font-size: 11px; }
    .migration-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; border-bottom: 1px solid rgba(128,128,128,0.07); }
    .migration-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--vscode-editor-font-family,monospace); font-size: 11px; }
    .migration-date { flex-shrink: 0; color: var(--vscode-descriptionForeground); }
    .mig-ok   { color: var(--vscode-testing-iconPassed,#73c991); flex-shrink: 0; }
    .mig-fail { color: var(--vscode-errorForeground,#f48771); flex-shrink: 0; }
    .mig-rb   { color: var(--vscode-editorWarning-foreground,#cca700); flex-shrink: 0; }
    .prisma-log { flex: 1; overflow-y: auto; font-family: var(--vscode-editor-font-family,monospace); font-size: 11px; padding: 8px 10px; white-space: pre-wrap; word-break: break-all; min-height: 80px; max-height: 200px; background: var(--vscode-terminal-background,var(--vscode-editor-background)); color: var(--vscode-terminal-foreground,var(--vscode-foreground)); }
    .conn-select-sm { background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground); border: 1px solid var(--vscode-dropdown-border,transparent); padding: 2px 4px; font-size: var(--vscode-font-size); font-family: var(--vscode-font-family); outline: none; width: 100%; }
    .no-schema-msg { color: var(--vscode-descriptionForeground); font-style: italic; font-size: 12px; padding: 4px 0; }

    /* Drift overlay */
    .drift-overlay { position: fixed; inset: 0; background: var(--vscode-editor-background); display: flex; flex-direction: column; z-index: 100; }
    .drift-header { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-editorGroupHeader-tabsBackground); flex-shrink: 0; }
    .drift-title { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .drift-body { flex: 1; overflow: auto; padding: 16px; }
    .drift-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .drift-table th { text-align: left; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--vscode-descriptionForeground); padding: 4px 8px; border-bottom: 2px solid var(--vscode-panel-border); }
    .drift-table td { padding: 4px 8px; border-bottom: 1px solid rgba(128,128,128,0.1); }
    .drift-ok   { color: var(--vscode-testing-iconPassed,#73c991); }
    .drift-miss { color: var(--vscode-errorForeground,#f48771); }
    .drift-extra { color: var(--vscode-editorWarning-foreground,#cca700); }

    .placeholder { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--vscode-descriptionForeground); font-style: italic; padding: 24px; }

    /* ── Table detail panel ── */
    .tdetail-wrap { flex: 1; overflow-y: auto; padding: 0; }
    .tdetail-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid var(--vscode-panel-border); background: var(--vscode-editorGroupHeader-tabsBackground); flex-shrink: 0; }
    .tdetail-title { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tdetail-meta { font-size: 11px; color: var(--vscode-descriptionForeground); flex-shrink: 0; }
    .tdetail-section { border-bottom: 1px solid var(--vscode-panel-border); }
    .tdetail-section-hdr {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--vscode-sideBarSectionHeader-foreground, var(--vscode-descriptionForeground));
      background: var(--vscode-sideBarSectionHeader-background);
      border-bottom: 1px solid var(--vscode-sideBarSectionHeader-border, var(--vscode-panel-border));
      cursor: pointer; user-select: none;
    }
    .tdetail-section-hdr:hover { background: var(--vscode-list-hoverBackground); }
    .tdetail-section-body { padding: 0; }
    .tdetail-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .tdetail-table th {
      position: sticky; top: 0; z-index: 1;
      background: var(--vscode-editorGroupHeader-tabsBackground);
      padding: 4px 10px; text-align: left; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--vscode-descriptionForeground);
      border-bottom: 2px solid var(--vscode-panel-border);
      white-space: nowrap;
    }
    .tdetail-table td { padding: 3px 10px; border-bottom: 1px solid rgba(128,128,128,0.08); white-space: nowrap; vertical-align: middle; }
    .tdetail-table tr:hover td { background: var(--vscode-list-hoverBackground); }
    .tdetail-badge { display: inline-flex; align-items: center; font-size: 9px; font-weight: 700; border-radius: 2px; padding: 1px 4px; margin-left: 4px; line-height: 14px; }
    .tdetail-badge.pk { background: #cca700; color: #000; }
    .tdetail-badge.fk { background: #007acc; color: #fff; }
    .tdetail-badge.uq { background: #5a2d82; color: #fff; }
    .tdetail-badge.ck { background: #3a6b35; color: #fff; }
    .tdetail-badge.idx { background: #1e2040; color: var(--vscode-foreground); border: 1px solid var(--vscode-panel-border); }
    .tdetail-null { color: var(--vscode-descriptionForeground); font-style: italic; }
    .tdetail-default { color: var(--vscode-textPreformat-foreground); font-family: var(--vscode-editor-font-family, monospace); font-size: 11px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .tdetail-fk-link { color: var(--vscode-textLink-foreground); cursor: pointer; text-decoration: underline; }
    .tdetail-fk-link:hover { opacity: 0.8; }
    .tdetail-loading { display: flex; align-items: center; gap: 10px; padding: 32px; color: var(--vscode-descriptionForeground); }
    .tdetail-error { padding: 24px; color: var(--vscode-errorForeground); font-size: 12px; }

    /* Error toast */
    .toast { position: fixed; bottom: 16px; right: 16px; background: var(--vscode-errorForeground); color: #fff; padding: 8px 14px; border-radius: 3px; font-size: 12px; max-width: 360px; z-index: 200; opacity: 1; transition: opacity 0.3s; }
    .toast.fade { opacity: 0; }
  </style>
</head>
<body>

  <!-- ── Left sidebar: Explorer (always visible) ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      Explorer
      <div class="sidebar-header-actions">
        <button class="btn-icon" id="btn-add-conn" title="Add Connection"><i class="codicon codicon-add"></i></button>
      </div>
    </div>

    <!-- Tree view -->
    <div class="view" id="view-tree" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="search-bar">
        <i class="search-icon codicon codicon-search"></i>
        <input class="search-input" id="search-input" type="text" placeholder="Filter tables, views…">
        <button class="search-clear hidden" id="search-clear" title="Clear"><i class="codicon codicon-close"></i></button>
      </div>
      <div class="tree" id="tree"></div>
    </div>

    <!-- Connection form (replaces tree view) -->
    <div class="view hidden" id="view-form" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="form-header">
        <button class="btn-icon" id="btn-back" title="Back"><i class="codicon codicon-arrow-left"></i></button>
        <span id="form-title">Add Connection</span>
      </div>
      <div class="form-body">
        <form id="conn-form" autocomplete="off">
          <div class="form-group">
            <label for="f-label">Label</label>
            <input type="text" id="f-label" placeholder="My Database" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-host">Host</label>
              <input type="text" id="f-host" placeholder="localhost" required>
            </div>
            <div class="form-group">
              <label for="f-port">Port</label>
              <input type="number" id="f-port" value="5432" min="1" max="65535" required>
            </div>
          </div>
          <div class="form-group">
            <label for="f-database">Database</label>
            <input type="text" id="f-database" placeholder="postgres" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-user">User</label>
              <input type="text" id="f-user" placeholder="postgres" required>
            </div>
            <div class="form-group">
              <label for="f-password">Password</label>
              <input type="password" id="f-password" placeholder="Leave blank to keep">
            </div>
          </div>
          <div class="form-group">
            <div class="checkbox-row">
              <input type="checkbox" id="f-ssl">
              <label for="f-ssl">Enable SSL</label>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="btn-test"><i class="codicon codicon-plug"></i>Test</button>
            <span class="test-status" id="test-status"></span>
            <button type="submit" class="btn btn-primary"><i class="codicon codicon-save"></i>Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Drag-resize handle -->
  <div class="resize-handle" id="resize-handle"></div>

  <!-- ── Right area: tabbed panels ── -->
  <div class="main-area" id="main-area">

    <!-- Tab bar (Query / History / Prisma + dynamic table tabs) -->
    <div class="tab-bar" id="main-tab-bar">
      <button class="tab" data-tab="query"><i class="codicon codicon-file-code"></i>Query</button>
      <button class="tab" data-tab="history"><i class="codicon codicon-history"></i>History</button>
      <button class="tab" data-tab="prisma" id="tab-btn-prisma"><i class="codicon codicon-symbol-class"></i>Prisma</button>
      <button class="tab" data-tab="activity"><i class="codicon codicon-pulse"></i>Activity</button>
      <div id="table-tab-list" style="display:flex;overflow-x:auto;"></div>
    </div>

    <!-- Query panel -->
    <div class="panel hidden" id="panel-query">
      <div class="query-tabs-bar">
        <div class="query-tab-list" id="query-tab-list"></div>
        <button class="btn-icon btn-new-tab" id="btn-new-tab" title="New query tab"><i class="codicon codicon-add"></i></button>
      </div>
      <div class="query-toolbar">
        <select class="conn-select" id="conn-select"><option value="">Select connection…</option></select>
        <button class="btn btn-primary" id="btn-run"><i class="codicon codicon-play"></i>Run</button>
        <button class="btn btn-secondary hidden" id="btn-cancel"><i class="codicon codicon-stop-circle"></i>Cancel</button>
        <button class="btn btn-secondary" id="btn-explain"><i class="codicon codicon-graph"></i>Explain</button>
        <div style="flex:1"></div>
        <div style="display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:3px;background:var(--vscode-badge-background);font-size:10px;color:var(--vscode-badge-foreground);opacity:0.6;user-select:none">F8 / Ctrl+Enter</div>
      </div>

      <!-- Resizable split: editor (top) + results (bottom) -->
      <div class="query-split" id="query-split">
        <div class="query-editor-pane" id="query-editor-pane">
          <div id="monaco-container"></div>
        </div>
        <div class="query-h-resize" id="query-h-resize"></div>
        <div class="query-results-pane" id="query-results-pane">
          <div class="query-status hidden" id="query-status"></div>
          <div style="display:flex;flex:1;min-height:0;overflow:hidden">
            <div class="results-section" id="results-section" style="flex:1;overflow:auto">
              <div class="results-placeholder" id="results-placeholder">Run a query to see results</div>
            </div>
            <div id="row-detail-panel" class="hidden" style="width:280px;flex-shrink:0;border-left:1px solid var(--vscode-panel-border);display:flex;flex-direction:column;overflow:hidden">
              <div style="display:flex;align-items:center;padding:5px 8px;border-bottom:1px solid var(--vscode-panel-border);background:var(--vscode-editorGroupHeader-tabsBackground);font-size:11px;font-weight:600;flex-shrink:0">
                Row detail
                <span style="flex:1"></span>
                <button class="btn-icon" id="row-detail-close" title="Close"><i class="codicon codicon-close"></i></button>
              </div>
              <div id="row-detail-body" style="flex:1;overflow:auto;padding:8px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- History panel -->
    <div class="panel hidden" id="panel-history">
      <div class="search-bar">
        <i class="search-icon codicon codicon-search"></i>
        <input class="search-input" id="history-search" type="text" placeholder="Search history…">
        <button class="search-clear hidden" id="history-clear" title="Clear"><i class="codicon codicon-close"></i></button>
      </div>
      <div class="history-list" id="history-list">
        <div class="empty-state"><span>No history yet.</span></div>
      </div>
    </div>

    <!-- Prisma panel -->
    <div class="panel hidden" id="panel-prisma">
      <div class="prisma-scroll">
        <div class="prisma-section">
          <div class="prisma-section-body" style="padding:6px 10px">
            <select class="conn-select-sm" id="prisma-conn-select">
              <option value="">Select connection…</option>
            </select>
          </div>
        </div>
        <div class="prisma-section">
          <div class="prisma-section-header"><i class="codicon codicon-file-code"></i>Schema File</div>
          <div class="prisma-section-body" id="prisma-schema-body">
            <div class="no-schema-msg">No schema.prisma selected.</div>
            <div class="prisma-actions-row">
              <button class="btn btn-secondary btn-xs" id="btn-browse-schema"><i class="codicon codicon-folder-opened"></i>Browse…</button>
            </div>
          </div>
        </div>
        <div class="prisma-section">
          <div class="prisma-section-header"><i class="codicon codicon-symbol-class"></i>Models <span id="prisma-models-badge" style="margin-left:4px"></span></div>
          <div class="prisma-section-body" id="prisma-models-body">
            <div class="no-schema-msg">No schema loaded.</div>
          </div>
        </div>
        <div class="prisma-section">
          <div class="prisma-section-header"><i class="codicon codicon-history"></i>Migrations</div>
          <div class="prisma-section-body" id="prisma-migrations-body">
            <div class="no-schema-msg">Select a connection to load migrations.</div>
          </div>
        </div>
        <div class="prisma-section">
          <div class="prisma-section-header"><i class="codicon codicon-terminal"></i>Log</div>
          <div class="prisma-log" id="prisma-log">Ready.</div>
        </div>
      </div>
    </div>

    <!-- Activity panel -->
    <div class="panel hidden" id="panel-activity">
      <div class="query-toolbar" style="gap:8px">
        <span style="font-weight:600;font-size:12px">pg_stat_activity</span>
        <select class="conn-select" id="activity-conn-select" style="max-width:200px"><option value="">Select connection…</option></select>
        <button class="btn btn-secondary" id="btn-activity-refresh"><i class="codicon codicon-refresh"></i>Refresh</button>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer">
          <input type="checkbox" id="activity-auto-refresh" style="cursor:pointer"> Auto (5s)
        </label>
        <span style="flex:1"></span>
        <span id="activity-status" style="font-size:11px;color:var(--vscode-descriptionForeground)"></span>
      </div>
      <div class="results-section" id="activity-results" style="overflow:auto">
        <div class="results-placeholder">Select a connection and click Refresh</div>
      </div>
    </div>

    <!-- Table detail panel (shared; content re-rendered per active table tab) -->
    <div class="panel hidden" id="panel-table">
      <div id="table-detail-toolbar" class="tdetail-toolbar">
        <span class="tdetail-title" id="table-detail-title"></span>
        <span class="tdetail-meta" id="table-detail-meta"></span>
        <button class="btn btn-secondary" id="btn-run-select" style="flex-shrink:0">
          <i class="codicon codicon-play"></i>Run SELECT
        </button>
        <button class="btn btn-secondary" id="btn-copy-prisma-model" style="flex-shrink:0" title="Copy Prisma model to clipboard">
          <i class="codicon codicon-symbol-class"></i>Copy model
        </button>
      </div>
      <div class="tdetail-wrap" id="table-detail-content"></div>
    </div>

  </div><!-- /.main-area -->



  <!-- Drift overlay (inline) -->
  <div class="drift-overlay hidden" id="drift-overlay">
    <div class="drift-header">
      <button class="btn-icon" id="drift-close" title="Close"><i class="codicon codicon-close"></i></button>
      <span class="drift-title" id="drift-title">Drift</span>
    </div>
    <div class="drift-body" id="drift-body"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

    // ── Helpers ────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function hl(text, f) {
      if (!f) return esc(text);
      var idx = text.toLowerCase().indexOf(f);
      if (idx < 0) return esc(text);
      return esc(text.slice(0, idx)) + '<mark>' + esc(text.slice(idx, idx + f.length)) + '</mark>' + esc(text.slice(idx + f.length));
    }

    function btnIcon(action, data, icon, title, danger) {
      var attrs = ' data-action="' + esc(action) + '"';
      for (var k in data) {
        if (Object.prototype.hasOwnProperty.call(data, k)) {
          var attr = k.replace(/([A-Z])/g, function (m) { return '-' + m.toLowerCase(); });

      return '<button class="btn-icon' + (danger ? ' btn-danger' : '') + '"' + attrs + ' title="' + esc(title) + '">'

        + '</svg>',
      folderFuncsClosed:
        '<svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">'

        + '<line x1="2" y1="13" x2="30" y2="13" stroke="#b44fff" stroke-width="1" opacity="0.3"/>'

      folderFuncsOpen:
        '<svg width="16" height="16" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">'

        + '<path d="M1 13h30l-3 17H4z" fill="#131629" stroke="#b44fff" stroke-width="1.5" stroke-linejoin="round"/>'

      table:

        + '<line x1="6" y1="5.5" x2="6" y2="13.5" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>'

      view:
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">'
        + '<rect x="1.5" y="2.5" width="13" height="11" rx="1" stroke="#ff61d3" stroke-width="1.2"/>'
        + '<line x1="1.5" y1="5.5" x2="14.5" y2="5.5" stroke="#ff61d3" stroke-width="1.2"/>'
        + '<ellipse cx="8" cy="10" rx="2.5" ry="1.5" stroke="#ff61d3" stroke-width="1"/>'
        + '<circle cx="8" cy="10" r="0.8" fill="#ff61d3"/>'

      func:
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">'
        + '<path d="M5 2.5c-1.5 0-2 .8-2 1.8v1.9c0 .9-.5 1.3-1.5 1.3.9 0 1.5.4 1.5 1.3v1.9c0 1 .5 1.8 2 1.8" stroke="#00d4aa" stroke-width="1.2" stroke-linecap="round"/>'
        + '<path d="M11 2.5c1.5 0 2 .8 2 1.8v1.9c0 .9.5 1.3 1.5 1.3-.9 0-1.5.4-1.5 1.3v1.9c0 1-.5 1.8-2 1.8" stroke="#00d4aa" stroke-width="1.2" stroke-linecap="round"/>'
        + '<path d="M6.5 8.5 9.5 8.5M8 6.5v4" stroke="#00d4aa" stroke-width="1.2" stroke-linecap="round"/>'
        + '</svg>',
      procedure:
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">'
        + '<circle cx="8" cy="8" r="5.5" stroke="#ff61d3" stroke-width="1.2"/>'
        + '<path d="M6 6l4 2-4 2V6z" fill="#ff61d3"/>'
        + '</svg>',
      column:
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">'
        + '<line x1="4" y1="4" x2="4" y2="12" stroke="#00d4aa" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>'
        + '<line x1="3" y1="6" x2="13" y2="6" stroke="#00d4aa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>'
        + '<line x1="3" y1="10" x2="13" y2="10" stroke="#00d4aa" stroke-width="1" stroke-linecap="round" opacity="0.5"/>'

        + '</svg>',
      pk:
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">'
        + '<circle cx="6" cy="7" r="3" stroke="#cca700" stroke-width="1.2"/>'
        + '<path d="M9 7h4.5M11.5 7v2.5M13.5 7v1.5" stroke="#cca700" stroke-width="1.2" stroke-linecap="round"/>'
        + '</svg>',
      fk:
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">'
        + '<path d="M2.5 8a2.5 2.5 0 0 1 5 0 2.5 2.5 0 0 0 5 0" stroke="#007acc" stroke-width="1.2" stroke-linecap="round" fill="none"/>'
        + '<circle cx="4.5" cy="8" r="1.5" stroke="#007acc" stroke-width="1.2"/>'
        + '<circle cx="11.5" cy="8" r="1.5" stroke="#007acc" stroke-width="1.2"/>'
        + '</svg>',
    };

    function treeIcon(name) {
      return '<span class="tree-icon">' + (ICONS[name] || '') + '</span>';
    }

    function infoRow(level, text) {
      return '<div class="tree-row"><span class="indent" style="width:' + (level * 16) + 'px"></span>'
        + '<span class="toggle"></span>'
        + '<span class="tree-label" style="color:var(--vscode-descriptionForeground);font-style:italic">' + esc(text) + '</span></div>';
    }

    function saveState() {
      persisted.tabs = tabs.map(function (t) { return { id: t.id, name: t.name, sql: t.sql, connId: t.connId }; });
      persisted.activeTabId = activeQTabId;
      localStorage.setItem('p4p-state', JSON.stringify(persisted));
    }

    var toastTimer = null;
    function showToast(msg) {
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        el.classList.add('fade');
        setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 350);
      }, 4000);
    }

    // ── Tree rendering ─────────────────────────────────────────────────────
    function renderTree() {
      var treeEl = document.getElementById('tree');
      if (!treeEl) return;
      if (connections.length === 0) {
        treeEl.innerHTML = '<div class="empty-state"><span>No connections yet.</span>'
          + '<button class="btn btn-primary" id="btn-add-first"><i class="codicon codicon-add"></i>Add Connection</button></div>';
        var b = document.getElementById('btn-add-first');
        if (b) b.addEventListener('click', function () { showForm(null); });
        return;
      }
      var scroll = treeEl.scrollTop;
      var f = filter.trim().toLowerCase();
      var html = '';
      connections.forEach(function (conn) { html += renderConn(conn, f); });
      treeEl.innerHTML = html;
      treeEl.scrollTop = scroll;
    }

    function renderConn(conn, f) {
      var nid = 'c:' + conn.id;
      var status = statuses[conn.id] || 'disconnected';
      var isConn = status === 'connected';
      var isExp  = !!expanded[nid];
      var toggleCls = status === 'connecting' ? 'codicon-loading codicon-modifier-spin'
                    : isConn ? (isExp ? 'codicon-chevron-down' : 'codicon-chevron-right') : '';
      var acts = '';
      if (status === 'disconnected' || status === 'error') acts += btnIcon('connect', { connId: conn.id }, 'codicon-plug', 'Connect');
      else if (status === 'connected') acts += btnIcon('disconnect', { connId: conn.id }, 'codicon-debug-disconnect', 'Disconnect');
      acts += btnIcon('edit-conn', { connId: conn.id }, 'codicon-edit', 'Edit');
      acts += btnIcon('delete-conn', { connId: conn.id }, 'codicon-trash', 'Delete', true);

      var html = '<div class="tree-row" data-node="' + esc(nid) + '">'
        + '<span class="indent" style="width:0px"></span>'
        + '<span class="toggle codicon ' + toggleCls + '"></span>'
        + '<span class="status-dot ' + status + '"></span>'
        + treeIcon('server')
        + '<span class="tree-label">' + hl(conn.label, f) + '</span>'
        + '<div class="tree-actions">' + acts + '</div></div>';

      if (isExp && isConn) {
        var sl = schemas[conn.id] || [];
        if (loadingNodes[nid]) { html += loadingRow(1); }
        else if (sl.length === 0) { html += infoRow(1, 'No schemas'); }
        else { sl.forEach(function (s) { html += renderSchema(conn.id, s.name, f); }); }
      }
      return html;
    }

    function renderSchema(connId, schemaName, f) {
      var nid = 's:' + connId + ':' + schemaName;
      var isExp = !!expanded[nid];
      var html = '<div class="tree-row" data-node="' + esc(nid) + '">'
        + '<span class="indent" style="width:16px"></span>'
        + '<span class="toggle codicon ' + (isExp ? 'codicon-chevron-down' : 'codicon-chevron-right') + '"></span>'
        + treeIcon(isExp ? 'folderSchemaOpen' : 'folderSchemaClosed')
        + '<span class="tree-label">' + hl(schemaName, f) + '</span>'
        + '<div class="tree-actions"></div></div>';
      if (isExp) {
        html += renderTablesGroup(connId, schemaName, f);
        html += renderFuncsGroup(connId, schemaName, f);
      }
      return html;
    }

    function renderTablesGroup(connId, schemaName, f) {
      var nid = 'tg:' + connId + ':' + schemaName;
      var isExp = !!expanded[nid];
      var tList = tables[connId + ':' + schemaName];
      var html = '<div class="tree-row" data-node="' + esc(nid) + '">'
        + '<span class="indent" style="width:32px"></span>'
        + '<span class="toggle codicon ' + (isExp ? 'codicon-chevron-down' : 'codicon-chevron-right') + '"></span>'
        + treeIcon(isExp ? 'folderTablesOpen' : 'folderTablesClosed')
        + '<span class="tree-label">Tables &amp; Views</span>'
        + (tList ? '<span class="tree-badge">' + tList.length + '</span>' : '')
        + '<div class="tree-actions"></div></div>';
      if (isExp) {
        if (loadingNodes[nid]) { html += loadingRow(3); }
        else if (!tList) { html += infoRow(3, 'Loading…'); }
        else {
          var filtered = f ? tList.filter(function (t) { return t.name.toLowerCase().indexOf(f) >= 0; }) : tList;
          if (!filtered.length) { html += infoRow(3, f ? 'No matches' : 'Empty schema'); }
          else { filtered.forEach(function (t) { html += renderTableNode(connId, schemaName, t, f); }); }
        }
      }
      return html;
    }

    function renderFuncsGroup(connId, schemaName, f) {
      var nid = 'fg:' + connId + ':' + schemaName;
      var isExp = !!expanded[nid];
      var fList = funcs[connId + ':' + schemaName];
      var html = '<div class="tree-row" data-node="' + esc(nid) + '">'
        + '<span class="indent" style="width:32px"></span>'
        + '<span class="toggle codicon ' + (isExp ? 'codicon-chevron-down' : 'codicon-chevron-right') + '"></span>'
        + treeIcon(isExp ? 'folderFuncsOpen' : 'folderFuncsClosed')
        + '<span class="tree-label">Functions</span>'
        + (fList ? '<span class="tree-badge">' + fList.length + '</span>' : '')
        + '<div class="tree-actions"></div></div>';
      if (isExp) {
        if (loadingNodes[nid]) { html += loadingRow(3); }
        else if (!fList) { html += infoRow(3, 'Loading…'); }
        else {
          var filtered = f ? fList.filter(function (fn) { return fn.name.toLowerCase().indexOf(f) >= 0; }) : fList;
          if (!filtered.length) { html += infoRow(3, f ? 'No matches' : 'No functions'); }
          else { filtered.forEach(function (fn) { html += renderFuncNode(connId, schemaName, fn, f); }); }
        }
      }
      return html;
    }

    function findPrismaModel(tableName) {
      if (!prismaSchema) return null;
      return prismaSchema.models.find(function (m) { return m.tableName === tableName || m.tableName.toLowerCase() === tableName.toLowerCase(); }) || null;
    }

    function renderTableNode(connId, schemaName, t, f) {
      var isView = t.type === 'view';
      var nid = (isView ? 'v:' : 't:') + connId + ':' + schemaName + ':' + t.name;
      var isExp = !!expanded[nid];
      var colList = cols[connId + ':' + schemaName + ':' + t.name];
      var prismaModel = findPrismaModel(t.name);
      var acts = btnIcon('open-table-detail', { connId: connId, schema: schemaName, table: t.name }, 'codicon-table', 'Open Details')
               + btnIcon('open-ddl', { connId: connId, schema: schemaName, table: t.name }, 'codicon-symbol-structure', 'View DDL')
               + btnIcon('copy-name', { name: t.name }, 'codicon-copy', 'Copy name');
      var prismaPin = prismaModel ? '<i class="codicon codicon-symbol-class" title="Prisma model: ' + esc(prismaModel.name) + '" style="font-size:11px;color:var(--vscode-descriptionForeground);margin-right:2px"></i>' : '';
      var estKey = connId + ':' + schemaName;
      var estVal = settings.showRowCount && estimates[estKey] !== undefined ? estimates[estKey][t.name] : undefined;
      var badgeHtml = estVal !== undefined
        ? '<span class="tree-badge" title="estimated rows">' + (estVal >= 1000 ? (estVal/1000).toFixed(0)+'k' : estVal) + '</span>'
        : (colList ? '<span class="tree-badge">' + colList.length + '</span>' : '');
      var html = '<div class="tree-row" data-node="' + esc(nid) + '">'
        + '<span class="indent" style="width:48px"></span>'
        + '<span class="toggle codicon ' + (isExp ? 'codicon-chevron-down' : 'codicon-chevron-right') + '"></span>'
        + treeIcon(isView ? 'view' : 'table')
        + '<span class="tree-label">' + hl(t.name, f) + '</span>'
        + prismaPin + badgeHtml
        + '<div class="tree-actions">' + acts + '</div></div>';
      if (isExp) {
        if (loadingNodes[nid]) { html += loadingRow(4); }
        else if (!colList) { html += infoRow(4, 'Loading…'); }
        else if (!colList.length) { html += infoRow(4, 'No columns'); }
        else { colList.forEach(function (c) { html += renderColRow(c); }); }
      }
      return html;
    }

    function renderColRow(c) {
      var iconName = c.isPrimaryKey ? 'pk' : c.isForeignKey ? 'fk' : 'column';
      return '<div class="tree-row"><span class="indent" style="width:64px"></span>'
        + '<span class="toggle" style="width:16px;display:inline-block"></span>'
        + treeIcon(iconName)
        + '<span class="tree-label">' + esc(c.name) + '</span>'
        + (c.isPrimaryKey ? '<span class="col-badge pk">PK</span>' : '')
        + (c.isForeignKey ? '<span class="col-badge fk">FK</span>' : '')
        + '<span class="col-type">' + esc(c.dataType) + '</span></div>';
    }

    function renderFuncNode(connId, schemaName, fn, f) {
      var nid = 'f:' + connId + ':' + schemaName + ':' + fn.specificName;
      var isExp = !!expanded[nid];
      var pList = funcParams[connId + ':' + schemaName + ':' + fn.specificName];
      var html = '<div class="tree-row" data-node="' + esc(nid) + '">'
        + '<span class="indent" style="width:48px"></span>'
        + '<span class="toggle codicon ' + (isExp ? 'codicon-chevron-down' : 'codicon-chevron-right') + '"></span>'
        + treeIcon(fn.type === 'FUNCTION' ? 'func' : 'procedure')
        + '<span class="tree-label">' + hl(fn.name, f) + '</span>'
        + (fn.returnType ? '<span class="col-type">→ ' + esc(fn.returnType) + '</span>' : '')
        + '<div class="tree-actions">' + btnIcon('copy-name', { name: fn.name }, 'codicon-copy', 'Copy name') + '</div></div>';
      if (isExp) {
        if (loadingNodes[nid]) { html += loadingRow(4); }
        else if (!pList) { html += infoRow(4, 'Loading…'); }
        else if (!pList.length) { html += infoRow(4, 'No parameters'); }
        else {
          pList.forEach(function (p) {
            html += '<div class="tree-row"><span class="indent" style="width:64px"></span>'
              + '<span class="toggle" style="width:16px;display:inline-block"></span>'
              + '<i class="tree-icon codicon codicon-symbol-variable"></i>'
              + '<span class="tree-label">' + esc(p.name) + '</span>'
              + '<span class="col-type">' + esc(p.mode + ' ' + p.dataType) + '</span></div>';
          });
        }
      }
      return html;
    }

    // ── Tree interaction ───────────────────────────────────────────────────
    function toggleNode(nid) {
      if (!nid) return;
      var ci = nid.indexOf(':');
      var type = nid.slice(0, ci);
      var rest = nid.slice(ci + 1);
      expanded[nid] = !expanded[nid];

      if (expanded[nid]) {
        if (type === 'c') {
          if (!schemas[rest] && !loadingNodes[nid] && statuses[rest] === 'connected') {
            loadingNodes[nid] = true;
            api.send('loadSchemas', { connId: rest });
          }
        } else if (type === 'tg' || type === 'fg') {
          var p = rest.indexOf(':'); var cId = rest.slice(0, p); var sc = rest.slice(p + 1);
          var key = cId + ':' + sc;
          if (type === 'tg' && !tables[key] && !loadingNodes[nid]) {
            loadingNodes[nid] = true;
            api.send('loadTables', { connId: cId, schema: sc });
            if (settings.showRowCount && !estimates[key]) {
              api.send('loadTableEstimates', { connId: cId, schema: sc });
            }
          } else if (type === 'fg' && !funcs[key] && !loadingNodes[nid]) {
            loadingNodes[nid] = true;
            api.send('loadFunctions', { connId: cId, schema: sc });
          }
        } else if (type === 't' || type === 'v') {
          var parts = rest.split(':'); var cId2 = parts[0]; var sc2 = parts[1]; var tbl = parts[2];
          var key2 = cId2 + ':' + sc2 + ':' + tbl;
          if (!cols[key2] && !loadingNodes[nid]) {
            loadingNodes[nid] = true;
            api.send('loadColumns', { connId: cId2, schema: sc2, table: tbl });
          }
        } else if (type === 'f') {
          var parts2 = rest.split(':'); var cId3 = parts2[0]; var sc3 = parts2[1]; var sn = parts2[2];
          var key3 = cId3 + ':' + sc3 + ':' + sn;
          if (!funcParams[key3] && !loadingNodes[nid]) {
            loadingNodes[nid] = true;
            api.send('loadFuncParams', { connId: cId3, schema: sc3, specificName: sn });
          }
        }
      }
      renderTree();
    }

    document.getElementById('tree').addEventListener('click', function (e) {
      var actionEl = e.target.closest('[data-action]');
      if (actionEl) { e.stopPropagation(); handleTreeAction(actionEl); return; }
      var rowEl = e.target.closest('.tree-row[data-node]');
      if (rowEl && rowEl.dataset.node) toggleNode(rowEl.dataset.node);
    });

    document.getElementById('tree').addEventListener('dblclick', function (e) {
      var rowEl = e.target.closest('.tree-row[data-node]');
      if (!rowEl) return;
      var nid = rowEl.dataset.node;
      // nid format: t:connId:schema:table or v:connId:schema:table
      if (nid && (nid.startsWith('t:') || nid.startsWith('v:'))) {
        var parts = nid.split(':');
        if (parts.length >= 4) openTableTab(parts[1], parts[2], parts.slice(3).join(':'));
      }
    });

    function handleTreeAction(el) {
      var d = el.dataset;
      switch (d.action) {
        case 'connect':
          statuses[d.connId] = 'connecting'; renderTree();
          api.send('connect', { connId: d.connId }); break;
        case 'disconnect':
          api.send('disconnect', { connId: d.connId }); break;
        case 'edit-conn': {
          var conn = connections.find(function (c) { return c.id === d.connId; });
          if (conn) showForm(conn); break;
        }
        case 'delete-conn':
          api.send('deleteConnection', { id: d.connId }); break;
        case 'open-table-detail':
          openTableTab(d.connId, d.schema, d.table); break;
        case 'open-ddl':
          api.send('openDDL', { connId: d.connId, schema: d.schema, table: d.table }); break;
        case 'copy-name':
          navigator.clipboard.writeText(d.name).catch(function () {}); break;
      }
    }

    // ── Explorer search ────────────────────────────────────────────────────
    var searchInput = document.getElementById('search-input');
    var searchClear = document.getElementById('search-clear');
    searchInput.addEventListener('input', function () { filter = searchInput.value; searchClear.classList.toggle('hidden', !filter); renderTree(); });
    searchInput.addEventListener('keydown', function (e) { if (e.key === 'Escape') { searchInput.value = ''; filter = ''; searchClear.classList.add('hidden'); renderTree(); } });
    searchClear.addEventListener('click', function () { searchInput.value = ''; filter = ''; searchClear.classList.add('hidden'); renderTree(); });

    // ── Tab switching ──────────────────────────────────────────────────────
    function switchMainTab(tab) {
      if (tab === 'explorer') tab = 'query'; // explorer is always visible now
      var isTableTab = tab.indexOf('tdetail-') === 0;
      persisted.tab = tab;
      saveState();
      // highlight static tabs
      document.querySelectorAll('.tab[data-tab]').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === tab); });
      // highlight table tabs
      document.querySelectorAll('.table-tab-btn').forEach(function (b) { b.classList.toggle('active', b.dataset.ttab === tab); });
      // show correct panel
      document.querySelectorAll('#main-area .panel').forEach(function (p) {
        var show = isTableTab ? p.id === 'panel-table' : p.id === 'panel-' + tab;
        p.classList.toggle('hidden', !show);
      });
      if (tab === 'query') { setTimeout(ensureMonacoReady, 30); renderQueryTabs(); renderConnSelect(); if (window.__initQuerySplit) window.__initQuerySplit(); }
      if (tab === 'history') { if (!historyEntries.length) api.send('loadHistory'); renderHistory(); }
      if (tab === 'prisma') { renderPrismaConnSelect(); renderPrismaSchemaInfo(); renderPrismaModels(); }
      if (tab === 'activity') { renderActivityConnSelect(); }
      if (isTableTab) { activeTableTabId = tab; renderActiveTableDetail(); }
    }

    document.querySelectorAll('.tab[data-tab]').forEach(function (btn) {
      btn.addEventListener('click', function () { switchMainTab(btn.dataset.tab); });
    });

    // ── Table detail tabs ──────────────────────────────────────────────────

    function openTableTab(connId, schema, tableName) {
      // reuse existing tab for the same table
      var existing = tableTabs.find(function (t) {
        return t.connId === connId && t.schema === schema && t.tableName === tableName;
      });
      if (existing) { switchMainTab(existing.id); return; }

      var id = 'tdetail-' + (nextTableTabId++);
      var tab = { id: id, connId: connId, schema: schema, tableName: tableName, loading: true, data: null, error: null };
      tableTabs.push(tab);
      renderTableTabs();
      switchMainTab(id);
      api.send('loadTableDetail', { connId: connId, schema: schema, tableName: tableName });
    }

    function closeTableTab(id) {
      var idx = tableTabs.findIndex(function (t) { return t.id === id; });
      if (idx < 0) return;
      tableTabs.splice(idx, 1);
      renderTableTabs();
      if (activeTableTabId === id) {
        // switch to adjacent tab or fallback to query
        var next = tableTabs[Math.min(idx, tableTabs.length - 1)];
        switchMainTab(next ? next.id : 'query');
      }
    }

    function renderTableTabs() {
      var container = document.getElementById('table-tab-list');
      if (!container) return;
      var html = tableTabs.map(function (t) {

      container.querySelectorAll('.table-tab-btn').forEach(function (el) {

        });

      container.querySelectorAll('[data-close-ttab]').forEach(function (btn) {

    function renderActiveTableDetail() {

      var titleEl = document.getElementById('table-detail-title');

            if (monacoEditor) monacoEditor.setValue(q);

        + '<div class="tdetail-section-body"><table class="tdetail-table"><thead><tr>'

      d.columns.forEach(function (c) {

          + '<td>' + (c.isNullable ? '<span class="tdetail-null">NULL</span>' : 'NOT NULL') + '</td>'
          + '<td class="tdetail-default">' + (c.columnDefault !== null ? esc(c.columnDefault) : '<span class="tdetail-null">—</span>') + '</td>'
          + '</tr>';

      // ── Constraints ──
      if (d.constraints.length) {

          + '</tr></thead><tbody>';
        d.constraints.forEach(function (c) {
          var typeMap = { 'PRIMARY KEY': 'pk', 'FOREIGN KEY': 'fk', 'UNIQUE': 'uq', 'CHECK': 'ck' };
          var cls = typeMap[c.type] || '';
          html += '<tr>'
            + '<td><span class="tdetail-badge ' + cls + '">' + esc(c.type.replace('PRIMARY KEY','PK').replace('FOREIGN KEY','FK').replace('UNIQUE','UQ').replace('CHECK','CK')) + '</span></td>'
            + '<td style="font-family:var(--vscode-editor-font-family,monospace);font-size:11px">' + esc(c.name) + '</td>'
            + '<td style="font-family:var(--vscode-editor-font-family,monospace);font-size:11px;color:var(--vscode-textPreformat-foreground)">' + esc(c.definition) + '</td>'
            + '</tr>';
        });
        html += '</tbody></table></div></div>';
      }

      // ── Indexes ──
      if (d.indexes.length) {
        html += '<div class="tdetail-section">'
          + '<div class="tdetail-section-hdr"><i class="codicon codicon-server-process"></i>Indexes <span style="margin-left:4px;font-weight:400;opacity:0.6">(' + d.indexes.length + ')</span></div>'
          + '<div class="tdetail-section-body"><table class="tdetail-table"><thead><tr>'
          + '<th>Name</th><th>Size</th><th>Flags</th><th>Definition</th>'
