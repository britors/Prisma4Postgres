<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Prisma4Postgres</title>
  <style>
    :root {
      --fg:       #e2e2f0;
      --fg-muted: #8888aa;
      --bg:       #0d0f1a;
      --bg-card:  #131629;
      --border:   #1e2040;
      --accent:   #b44fff;
      --teal:     #00d4aa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 380px; height: 220px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      padding: 28px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    svg.logo { width: 56px; height: 56px; flex-shrink: 0; }
    .title-block { text-align: left; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }
    h1 span { color: #4a9fd8; }
    .version {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      color: var(--teal);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 10px;
    }
    .divider { width: 100%; height: 1px; background: var(--border); margin: 4px 0; }
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #4a9fd8);
      border-radius: 2px;
      animation: load 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes load {
      0%   { width: 0%; opacity: 1; }
      70%  { width: 85%; opacity: 1; }
      90%  { width: 92%; opacity: 1; }
      100% { width: 100%; opacity: 0.6; }
    }
    .status {
      font-size: 11px;
      color: var(--fg-muted);
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-row">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
        <defs>
          <radialGradient id="bg" cx="50%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#182035"/>
            <stop offset="100%" stop-color="#080d1a"/>
          </radialGradient>
          <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="14" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <clipPath id="pc"><polygon points="250,62 52,370 448,370"/></clipPath>
        </defs>
        <rect width="500" height="500" fill="url(#bg)" rx="30"/>
        <polygon points="250,62 52,370 448,370" fill="#2255a0" opacity="0.30" filter="url(#glow)"/>
        <polygon points="250,62 151,216 349,216" fill="#64b3f4"/>
        <polygon points="151,216 250,370 349,216" fill="#3d8fd9"/>
        <polygon points="52,370 151,216 250,370"  fill="#2265a8"/>
        <polygon points="448,370 349,216 250,370" fill="#174f8c"/>
        <g clip-path="url(#pc)" opacity="0.10">
          <line x1="0" y1="190" x2="500" y2="190" stroke="#9dd4fa" stroke-width="2"/>
          <line x1="0" y1="255" x2="500" y2="255" stroke="#9dd4fa" stroke-width="2"/>
          <line x1="0" y1="320" x2="500" y2="320" stroke="#9dd4fa" stroke-width="2"/>
        </g>
        <g fill="none" stroke="#05090f" stroke-width="2" stroke-linejoin="round">
          <polygon points="250,62 52,370 448,370"/>
          <line x1="151" y1="216" x2="349" y2="216"/>
          <line x1="151" y1="216" x2="250" y2="370"/>
          <line x1="349" y1="216" x2="250" y2="370"/>
        </g>
        <line x1="250" y1="62" x2="151" y2="216" stroke="#9dd4fa" stroke-width="2.5" stroke-linecap="round" opacity="0.80"/>
        <line x1="250" y1="62" x2="349" y2="216" stroke="#6ab9f5" stroke-width="2.0" stroke-linecap="round" opacity="0.50"/>
        <circle cx="250" cy="62" r="4" fill="#b8e2ff" opacity="0.90"/>
      </svg>

      <div class="title-block">
        <h1>Prisma<span>4</span>Postgres</h1>
        <span class="version" id="ver">v—</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>
    <div class="status" id="status">Starting…</div>
  </div>

  <script>
    var api = window.api;
    api.invoke('get-about-info').then(function (info) {
      document.getElementById('ver').textContent = 'v' + info.version;
    }).catch(function () {});
  </script>
</body>
</html>
